<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid AI — Interactive Curriculum</title>
<style>
  /* ---------- Reset & base ---------- */
  *,*::before,*::after { box-sizing: border-box; }
  html,body { margin:0; padding:0; height:100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    color: #1a1d23;
    background: #f7f7f5;
    line-height: 1.55;
    font-size: 15.5px;
    -webkit-font-smoothing: antialiased;
  }
  h1,h2,h3,h4 { font-weight: 600; line-height: 1.25; color: #0f1115; }
  h1 { font-size: 1.9rem; margin: 0 0 .6rem; }
  h2 { font-size: 1.45rem; margin: 2rem 0 .8rem; padding-bottom:.35rem; border-bottom:1px solid #e5e3dd; }
  h3 { font-size: 1.15rem; margin: 1.5rem 0 .5rem; }
  h4 { font-size: 1rem; margin: 1.2rem 0 .35rem; color:#2a2f38; }
  p { margin: .55rem 0 .9rem; }
  ul,ol { margin: .4rem 0 1rem 1.2rem; padding: 0; }
  li { margin: .25rem 0; }
  code { background:#eeece5; padding: .08rem .35rem; border-radius:3px; font-size: .9em; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;}
  a { color: #1f5fbb; text-decoration: none; }
  a:hover { text-decoration: underline; }
  hr { border: 0; border-top: 1px solid #e5e3dd; margin: 1.6rem 0; }
  blockquote { border-left: 3px solid #c7c2b5; margin: 1rem 0; padding: .25rem 0 .25rem .9rem; color:#3a3f48; }
  table { border-collapse: collapse; width: 100%; margin: .8rem 0 1.2rem; font-size: .92rem; }
  th, td { border: 1px solid #d8d5cb; padding: .45rem .6rem; vertical-align: top; text-align: left;}
  th { background:#efece3; font-weight:600; }

  /* ---------- Layout ---------- */
  .app { display: grid; grid-template-columns: 290px 1fr 320px; min-height:100vh; }
  .sidebar {
    background: #11161d; color:#d4d8df; padding: 1rem .9rem 6rem; overflow-y: auto;
    position: sticky; top:0; height:100vh; border-right:1px solid #0a0d12;
  }
  .sidebar h1 { color: #f0eee6; font-size: 1.1rem; margin: .2rem 0 .15rem; letter-spacing:.2px;}
  .sidebar .tag { font-size:.7rem; color:#8b94a3; text-transform: uppercase; letter-spacing:.7px; }
  .sidebar input[type="search"] {
    width:100%; margin: .9rem 0 .6rem; padding: .45rem .6rem;
    background:#1c232c; color:#e6e9ee; border:1px solid #2a323d; border-radius:6px;
    font-size:.85rem;
  }
  .sidebar input[type="search"]:focus { outline:none; border-color:#4a90ff; }
  .toolbar { display:grid; grid-template-columns:1fr 1fr; gap:.3rem; margin-bottom:.7rem;}
  .toolbar button {
    background:#1c232c; color:#cbd1da; border:1px solid #2a323d;
    padding:.4rem .35rem; border-radius:5px; font-size:.72rem; cursor:pointer;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    text-align:center; line-height:1.1;
  }
  .toolbar button:hover { background:#2a323d; color:#fff; }
  .toolbar button.active { background:#3a6fc7; color:#fff; border-color:#3a6fc7; }
  .nav-module { margin-top:.7rem; }
  .nav-module > .mod-title {
    display:flex; align-items:flex-start; justify-content:space-between;
    cursor:pointer; user-select:none; gap:.4rem;
    font-size:.72rem; text-transform:uppercase; letter-spacing:.5px;
    color:#7e8794; padding:.4rem .35rem; border-radius:4px;
    line-height:1.3;
  }
  .nav-module > .mod-title > span:first-child { flex:1; }
  .nav-module > .mod-title:hover { color:#fff; background:#1a2129; }
  .nav-module .mod-title .chev { font-size:.7rem; opacity:.7;}
  .nav-module ul { list-style:none; margin:.2rem 0 .3rem; padding-left:.3rem; display:none;}
  .nav-module.open ul { display:block; }
  .nav-module li a {
    display:block; padding:.22rem .45rem; color:#c2c8d2; border-radius:4px;
    font-size:.86rem; line-height:1.35;
  }
  .nav-module li a:hover { background:#1c232c; color:#fff; text-decoration:none;}
  .nav-module li a.current { background:#27406b; color:#fff; }
  .nav-module li a.read::before { content:"✓ "; color:#5fbb6b; font-size:.85em;}

  .main {
    padding: 2.2rem 3rem 6rem; max-width: 920px; margin: 0 auto; width:100%;
    overflow-x: hidden;
  }
  .main .crumbs { font-size:.78rem; color:#6a6f78; margin-bottom:.4rem; text-transform:uppercase; letter-spacing:.5px;}
  .lesson-meta { font-size:.85rem; color:#5a606a; margin: .4rem 0 1rem; display:flex; gap:1rem; flex-wrap:wrap;}
  .lesson-meta span.chip { background:#eeece5; padding:.15rem .55rem; border-radius:99px; font-size:.78rem; color:#3a3f48;}

  .glossary-pane {
    background:#fbfaf6; border-left:1px solid #e5e3dd; padding: 1rem 1rem 4rem;
    position: sticky; top:0; height:100vh; overflow-y:auto;
  }
  .glossary-pane h3 { margin: .3rem 0 .6rem; font-size: 1rem; color:#1f242c; display:flex; justify-content:space-between; align-items:center;}
  .glossary-pane input { width:100%; padding:.4rem .55rem; border:1px solid #d8d5cb; border-radius:5px; font-size:.85rem; margin-bottom:.6rem;}
  .glossary-pane input:focus { outline:none; border-color:#3a6fc7;}
  .glossary-pane .gloss-entry {
    padding:.45rem .15rem; border-bottom:1px solid #ece9df; font-size:.83rem;
  }
  .glossary-pane .gloss-term { font-weight:600; color:#1a1d23;}
  .glossary-pane .gloss-def { color:#3a3f48; margin-top:.15rem; line-height:1.45;}
  .glossary-pane .gloss-link { font-size:.72rem; color:#3a6fc7; margin-top:.2rem; display:block;}

  /* ---------- Inline glossary highlight ---------- */
  .term {
    border-bottom: 1px dashed #a8a395; cursor: help; color: #2a2f38;
  }
  .term:hover { background: #fff2c8; }

  /* ---------- Popover ---------- */
  .popover {
    position: absolute; z-index: 9999;
    background: #1a1d23; color: #f0eee6; padding: .7rem .85rem;
    border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.25);
    max-width: 320px; font-size: .85rem; line-height: 1.5;
    pointer-events: auto;
  }
  .popover .pop-term { font-weight:700; color:#ffdf91; margin-bottom:.25rem;}
  .popover .pop-link { color:#9ec5ff; font-size:.78rem; display:inline-block; margin-top:.4rem; cursor:pointer;}

  /* ---------- Mental model callouts ---------- */
  .mm-callout {
    background:#0f3a4a; color:#e8f4f8; border-left:4px solid #4cc9d4;
    padding: .85rem 1rem; margin: 1.2rem 0; border-radius: 0 8px 8px 0;
    font-size:.92rem;
  }
  .mm-callout .mm-label { font-size:.7rem; color:#9bdde5; text-transform:uppercase; letter-spacing:1px; font-weight:700; margin-bottom:.25rem;}
  .mm-callout strong { color:#fff; }

  .key-callout {
    background:#fffaea; border-left:4px solid #e0b540; padding:.8rem 1rem;
    margin: 1rem 0; border-radius: 0 6px 6px 0;
  }
  .key-callout .kl { font-size:.7rem; color:#a67c00; text-transform:uppercase; letter-spacing:1px; font-weight:700; margin-bottom:.2rem;}

  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(170px, 1fr)); gap:.7rem; margin:1rem 0;}
  .stat {
    background:#fff; border:1px solid #e5e3dd; border-radius:8px;
    padding:.75rem .9rem;
  }
  .stat .v { font-size:1.25rem; font-weight:700; color:#1f5fbb;}
  .stat .l { font-size:.78rem; color:#5a606a; text-transform:uppercase; letter-spacing:.6px; margin-top:.15rem;}

  /* ---------- Drill-into footer ---------- */
  .drill-into {
    margin-top: 2.5rem; padding: 1rem 1.1rem; background:#f0eee5;
    border-radius: 8px; border: 1px solid #e5e3dd;
  }
  .drill-into h4 { margin:.1rem 0 .5rem; font-size: .85rem; text-transform:uppercase; letter-spacing:.6px; color:#5a606a;}
  .drill-into .drill-row { display:flex; flex-wrap:wrap; gap:.4rem; }
  .drill-into a {
    background:#fff; border:1px solid #d8d5cb; padding:.35rem .65rem;
    border-radius:99px; font-size:.82rem; color:#2a3344;
  }
  .drill-into a:hover { background:#1f5fbb; color:#fff; border-color:#1f5fbb; text-decoration:none;}

  /* ---------- Self-check / notes ---------- */
  .selfcheck {
    margin-top:1.6rem; background:#f3f1ea; border:1px dashed #c7c2b5;
    border-radius:8px; padding:.9rem 1.1rem;
  }
  .selfcheck h4 { margin: 0 0 .4rem; font-size: .85rem; color:#5a606a; text-transform:uppercase; letter-spacing:.6px;}
  .selfcheck ol { margin: 0 0 0 1.2rem; }

  .notes textarea {
    width:100%; min-height: 90px; border:1px solid #d8d5cb; border-radius:6px;
    padding:.5rem .6rem; font-family: inherit; font-size:.92rem; resize:vertical;
    background:#fffefb;
  }
  .notes .save-state { font-size:.75rem; color:#5fbb6b; margin-left:.5rem;}

  .lesson-actions { display:flex; gap:.5rem; margin: 1.5rem 0 .5rem; flex-wrap:wrap;}
  .lesson-actions button {
    background:#fff; border:1px solid #d8d5cb; padding:.4rem .8rem; border-radius:6px;
    font-size:.82rem; cursor:pointer; color:#2a3344;
  }
  .lesson-actions button:hover { background:#1f5fbb; color:#fff; border-color:#1f5fbb; }
  .lesson-actions button.read-done { background:#5fbb6b; color:#fff; border-color:#5fbb6b;}

  /* ---------- Progress bar ---------- */
  .progress-wrap {
    margin: .7rem 0 .9rem; background:#1c232c; height:6px; border-radius:99px; overflow:hidden;
  }
  .progress-wrap .bar { background: linear-gradient(90deg, #4cc9d4, #5fbb6b); height:100%; transition: width .3s;}
  .progress-label { font-size:.7rem; color:#7e8794; }

  /* ---------- Path views ---------- */
  .path-view {
    background:#fff; border:1px solid #e5e3dd; border-radius:10px; padding:1.4rem 1.6rem; margin-bottom:1.5rem;
  }
  .path-view h2 { border:none; margin-top:.2rem; }

  /* ---------- Responsive ---------- */
  @media (max-width: 1180px) {
    .app { grid-template-columns: 260px 1fr; }
    .glossary-pane { display:none; }
    .glossary-pane.open {
      display:block; position:fixed; right:0; top:0; width:340px; z-index:100;
      box-shadow:-4px 0 18px rgba(0,0,0,.15);
    }
  }
  @media (max-width: 760px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: fixed; left:-100%; width: 280px; z-index:200; transition: left .25s;}
    .sidebar.open { left:0; }
    .main { padding: 1.2rem 1.1rem 4rem; }
    .mobile-bar { display:flex !important; }
  }
  .mobile-bar {
    display:none; position: sticky; top:0; background:#11161d; color:#fff;
    padding:.55rem .8rem; z-index:50; align-items:center; gap:.6rem;
    border-bottom:1px solid #2a323d;
  }
  .mobile-bar button { background:#1c232c; color:#fff; border:1px solid #2a323d; padding:.3rem .55rem; border-radius:5px; font-size:.8rem;}
  .mobile-bar .ttl { font-size:.9rem; font-weight:600;}

  /* ---------- Print ---------- */
  @media print {
    .sidebar, .glossary-pane, .mobile-bar, .drill-into, .lesson-actions, .selfcheck { display:none !important; }
    .main { max-width: none; padding: 0; }
    body { font-size: 11pt; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- ============== SIDEBAR ============== -->
  <aside class="sidebar" id="sidebar">
    <div class="tag">Curriculum</div>
    <h1>Liquid AI — Interactive Textbook</h1>
    <div class="progress-wrap"><div class="bar" id="progressBar" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0 of 0 lessons read</div>

    <input type="search" id="searchInput" placeholder="Search lessons + glossary…" autocomplete="off">

    <div class="toolbar">
      <button data-path="linear" class="active">Linear</button>
      <button data-path="product">By Product</button>
      <button data-path="competitor">By Competitor</button>
      <button data-path="environment">By Environment</button>
      <button data-path="mental">Mental Models</button>
      <button data-path="vulnerability">Vulnerabilities</button>
    </div>

    <nav id="navTree"></nav>

    <hr style="border-color:#2a323d;">
    <div style="font-size:.75rem; color:#7e8794; line-height:1.5;">
      Keyboard: <code style="background:#1c232c;color:#cbd1da;">g</code> glossary ·
      <code style="background:#1c232c;color:#cbd1da;">/</code> search ·
      <code style="background:#1c232c;color:#cbd1da;">j</code>/<code style="background:#1c232c;color:#cbd1da;">k</code> next/prev lesson
    </div>
    <div style="font-size:.7rem; color:#5a606a; margin-top:.7rem;">
      Notes &amp; progress saved in your browser only. Export via the button below.
    </div>
    <button id="exportBtn" style="margin-top:.6rem; background:#1c232c; color:#cbd1da; border:1px solid #2a323d; padding:.4rem .6rem; border-radius:5px; font-size:.78rem; cursor:pointer; width:100%;">Export notes &amp; progress</button>
    <button id="resetBtn" style="margin-top:.4rem; background:transparent; color:#7e8794; border:1px solid #2a323d; padding:.3rem .6rem; border-radius:5px; font-size:.72rem; cursor:pointer; width:100%;">Reset progress</button>
  </aside>

  <!-- ============== MAIN ============== -->
  <main class="main">
    <div class="mobile-bar">
      <button id="mobileMenu">☰</button>
      <div class="ttl" id="mobileTitle">Liquid AI</div>
      <button id="mobileGloss" style="margin-left:auto;">Glossary</button>
    </div>
    <div id="lessonContainer"></div>
  </main>

  <!-- ============== GLOSSARY ============== -->
  <aside class="glossary-pane" id="glossaryPane">
    <h3>Glossary <span style="font-size:.7rem; color:#5a606a; font-weight:400;">press <code>g</code></span></h3>
    <input type="text" id="glossSearch" placeholder="Filter terms…">
    <div id="glossList"></div>
  </aside>
</div>

<!-- Popover container -->
<div id="popover" class="popover" style="display:none;"></div>

<!-- Lesson data & app logic loaded below -->
<script>
/* ============================================================
   LIQUID AI CURRICULUM DATA
   - GLOSSARY: keyed map of terms (lowercase key) → {term, def, link?}
   - MODULES: ordered array of {id, title, lessons:[...]}
   - LESSON: {id, title, html, meta?, drill?, selfcheck?, mentalModels?, tags?}
   - PATHS: alternate orderings (product, competitor, environment, mental, vulnerability)
   ============================================================ */

const GLOSSARY = {
  "lnn": {term: "LNN (Liquid Neural Network)", def: "Family of continuous-time neural nets descended from Hasani & Lechner's TU Wien work; inputs modulate the time constants of each neuron. Origin of the 'Liquid' name."},
  "ltc": {term: "LTC (Liquid Time-constant Network)", def: "2020 paper introducing input-dependent time constants. The mathematical ancestor of Liquid AI's models. Inspired by the 302-neuron nervous system of C. elegans."},
  "cfc": {term: "CfC (Closed-form Continuous-time)", def: "2022 Nature Machine Intelligence model. Removes ODE solvers from LTCs by giving a closed-form solution — orders of magnitude faster training/inference while preserving expressivity."},
  "star": {term: "STAR (Synthesis of Tailored Architectures)", def: "ICLR 2025 oral. Evolutionary, hardware-in-the-loop architecture search that designed LFM2's hybrid recipe. The reason Liquid says architectures are 'discovered, not compressed.'"},
  "lfm": {term: "LFM (Liquid Foundation Model)", def: "Generic name for Liquid's foundation model line. LFM v1 (Sept 2024) was the first generation; LFM2 (mid 2025) the hybrid edge-optimized generation; LFM2.5 (late 2025–2026) the current."},
  "lfm2": {term: "LFM2", def: "Hybrid architecture: 10 gated short-conv blocks + 6 GQA blocks across 16 layers. Only ~20% attention. Sizes 350M / 700M / 1.2B / 2.6B. The basis of Liquid's edge category leadership claim."},
  "lfm25": {term: "LFM2.5", def: "May 2026 generation. Headlined by LFM2.5-8B-A1B (MoE) and LFM2.5-1.2B-Thinking (fits in 900MB). Adds reasoning and sparse activation to the LFM2 recipe."},
  "lfm25-8b": {term: "LFM2.5-8B-A1B", def: "24-layer MoE: 18 linear-conv layers (zero KV cache) + 6 GQA. 8.3B total parameters, 1.5B active per token. 128K context, trained on 38T tokens."},
  "lfm25-thinking": {term: "LFM2.5-1.2B-Thinking", def: "Compact reasoning model fitting in 900MB of memory — designed to bring chain-of-thought to phones and wearables."},
  "lfm2-vl": {term: "LFM2-VL", def: "Vision-language variant. Uses SigLIP2 NaFlex as the vision encoder for variable-resolution input."},
  "lfm2-audio": {term: "LFM2-Audio-1.5B", def: "October 2025 audio foundation model. Liquid's challenge to Cartesia and OpenAI Whisper at the edge."},
  "nanos": {term: "Nanos", def: "Task-specific micro-models (typically 350M class) — e.g. JSON extraction, function-calling, translation. Liquid's answer to the 'one model per skill' SLM pattern."},
  "leap": {term: "LEAP (Liquid Edge AI Platform)", def: "SDK + runtime + model zoo. The developer surface for shipping LFMs into iOS/Android/Linux/Windows apps."},
  "apollo": {term: "Apollo", def: "Liquid's consumer iOS chat app. The flagship demonstration of LFM2 running on-device and the primary consumer-facing brand asset."},
  "liquidkit": {term: "LiquidKit", def: "Native Swift / Kotlin SDKs for embedding LFMs directly in mobile apps."},
  "lfm-license": {term: "LFM Open License v1.0", def: "Liquid's custom permissive license. Free for organizations under $10M revenue; commercial license required above. Source of Mental Model 4 (license = business model choice)."},

  "gqa": {term: "GQA (Grouped-Query Attention)", def: "Attention variant where multiple query heads share key/value heads — reduces KV cache size. Used as the attention block inside LFM2/LFM2.5."},
  "kv-cache": {term: "KV cache", def: "Memory of past key/value vectors a transformer must hold to do incremental generation. Grows linearly with context length — the dominant edge-inference bottleneck."},
  "ssm": {term: "SSM (State Space Model)", def: "Linear-recurrence architecture (e.g. Mamba) with constant memory per token. Major non-transformer family Liquid competes with."},
  "mamba": {term: "Mamba", def: "Selective state-space model from Albert Gu / Tri Dao. Closest non-transformer competitor to LFM at the architectural level; underpins Cartesia, parts of Jamba/Granite/Nemotron-H."},
  "rwkv": {term: "RWKV", def: "RNN-style architecture combining attention and recurrence properties. An open community-led non-transformer line; small footprint but limited big-customer proof."},
  "jamba": {term: "Jamba (AI21)", def: "Hybrid Mamba + Transformer + MoE family from AI21. Targets long-context enterprise workloads — Ring 1 competitor."},
  "granite": {term: "IBM Granite 4.0", def: "IBM's hybrid Mamba/transformer enterprise SLM line. Comes with SOC 2 / ISO certifications Liquid lacks."},
  "nemotron-h": {term: "Nemotron-H", def: "NVIDIA's hybrid SSM-attention model line. Architectural cousin in Ring 1."},
  "sakana": {term: "Sakana AI", def: "Tokyo-based lab (David Ha, Llion Jones) doing evolutionary/biological model search. Most direct philosophical competitor to STAR."},
  "cartesia": {term: "Cartesia", def: "Karan Goel / Albert Gu / Tri Dao spinout from the Mamba team. Strong in real-time voice / audio SSMs — contests Liquid's audio story."},
  "moe": {term: "MoE (Mixture of Experts)", def: "Sparse-activation architecture: many expert sub-networks, only a few selected per token. LFM2.5-8B-A1B uses MoE: 8.3B total / 1.5B active."},
  "hybrid": {term: "Hybrid architecture", def: "Combines a non-attention block (gated conv / SSM / linear recurrence) with a small amount of attention. Liquid's signature: 'just enough attention.'"},
  "gated-conv": {term: "Gated short conv", def: "Short causal convolution wrapped in a gating mechanism — replaces most attention blocks in LFM2. Cheap, KV-cache-free, hardware-friendly."},
  "naflex": {term: "NaFlex / SigLIP2", def: "Google DeepMind's variable-resolution vision encoder. Used in LFM2-VL to avoid wasteful padding/cropping."},
  "dpo": {term: "DPO (Direct Preference Optimization)", def: "Alignment technique that trains a model to prefer chosen over rejected responses without a separate reward model. Used in LFM2 post-training."},
  "sft": {term: "SFT (Supervised Fine-Tuning)", def: "Standard post-training step on curated instruction/response pairs. Precedes DPO in LFM's pipeline."},
  "length-norm": {term: "Length-normalized DPO", def: "DPO variant that normalizes by response length to avoid the well-known 'longer = preferred' bias. Liquid is unusually explicit about using it."},
  "mid-train": {term: "Mid-training", def: "Intermediate stage between large-scale pre-training and SFT — focused on high-quality / harder data. A distinguishing piece of Liquid's pipeline."},
  "gguf": {term: "GGUF", def: "Quantized model file format (descended from llama.cpp/ggml). Liquid ships LFMs in GGUF so they run via llama.cpp, LM Studio, Ollama, etc."},
  "executorch": {term: "ExecuTorch", def: "Meta's PyTorch-based on-device runtime. One of the runtimes LEAP supports — and a commoditization risk (Vulnerability 6)."},
  "mlx": {term: "MLX", def: "Apple's array framework optimized for Apple Silicon. Increasingly a default for on-device Mac/iOS inference."},
  "fastflowlm": {term: "FastFlowLM", def: "AMD-aligned runtime for on-NPU inference. Risk: if it generalizes, runtime becomes a commodity layer and Liquid's models compete on benchmarks alone."},
  "quantization": {term: "Quantization", def: "Compressing weights from FP16/BF16 down to INT8/INT4/lower. Critical to fitting LFMs in phone-class memory budgets."},
  "distillation": {term: "Distillation", def: "Training a small student model to imitate a large teacher's outputs. Most edge SLMs (Phi, Gemma 3n, Llama 3.2) are distillation-driven. Liquid's foil: 'discovered, not compressed.'"},
  "discovered-not-compressed": {term: "Discovered, not compressed", def: "Liquid's central architectural claim: LFM2 was found by STAR architecture search at its native size, not shrunk from a frontier model. Differentiates from distillation-led SLMs."},

  "edge-ai": {term: "Edge AI", def: "Inference that happens on or near the device (phone, PC, car, wearable) rather than in cloud datacenters. The category Liquid leads. Market: $35.81B in 2025 → $385.89B by 2034 (29.9% CAGR)."},
  "on-device": {term: "On-device", def: "Subset of edge AI — runs entirely on the consumer device, no network round-trip. The privacy/latency/offline value proposition."},
  "slm": {term: "SLM (Small Language Model)", def: "Language model small enough to run on consumer hardware (loose definition, usually <8B params). Market: $8.62B → $58.05B. Liquid plays here but rejects the framing — 'foundation model' is the brand word."},
  "tam": {term: "TAM (Total Addressable Market)", def: "Maximum possible revenue if a vendor captured 100% of demand for a category."},
  "cagr": {term: "CAGR (Compound Annual Growth Rate)", def: "Smoothed annual growth rate. Edge AI's 29.9% CAGR is the headline reason investors put $250M into Liquid's Series A."},
  "capex": {term: "Goldman $7.6T AI capex", def: "Goldman Sachs estimate of AI infrastructure capital expenditure 2026-2031. Used to argue that the edge complements (not threatens) the cloud build-out."},
  "copilot-plus": {term: "Copilot+ PC", def: "Microsoft branding for Windows PCs with 40+ TOPS NPUs. The Ring 3 / Ring 2 battleground."},

  {id:"m0", title:"Module 0 · How to use this textbook", lessons:[
    {id:"0.1", title:"What this textbook is for", html:`
      <p>You are reading a compressed onboarding for Liquid AI — designed to take you from outsider to credible interlocutor in roughly two weeks of focused study, instead of the usual ninety days.</p>
      <p>The brief is unusual: you should be able to <strong>communicate about why the technical detail matters</strong>. That means you cannot route around the hard parts. The architecture, the training pipeline, the license, the rings — these are not background. They are the substance.</p>
      <p>Three working principles:</p>
      <ol>
        <li><strong>Multiple entry paths.</strong> You can read top-to-bottom, drill in by product, by competitor ring, by deployment environment, by vulnerability, or by mental model. Use the buttons in the sidebar.</li>
        <li><strong>Cross-links and glossary, everywhere.</strong> Any underlined term has a definition. Click it to pin the popover or jump to the glossary entry.</li>
        <li><strong>This is yours to modify.</strong> Notes are saved locally. You can mark lessons read, write personal notes, and use the gaps checklist (lesson 13.5) to identify what you still don't understand.</li>
      </ol>
      <p>The goal is not to memorize. The goal is to develop <strong>intuition</strong>: when someone says "the LFM2.5-8B-A1B has eighteen linear-conv layers with zero KV cache," you should know <em>why that sentence is doing work</em> and what would change if any word in it changed.</p>

  {id:"m1", title:"Module 1 · Origins and scientific foundations", lessons:[
    {id:"1.1", title:"The C. elegans insight", html:`
      <p>C. elegans is a millimetre-long nematode worm. Its entire nervous system has 302 neurons and is fully mapped. In the early 2010s, computational neuroscientists at TU Wien — including Ramin Hasani and Mathias Lechner — kept returning to a question: <em>why can this worm do so much with so few neurons, when our artificial networks need millions?</em></p>
      <p>The answer, in their telling, was not architecture but <strong>dynamics</strong>. Biological neurons are continuous-time differential equations whose internal time constants change with what they're seeing. Artificial neurons, by contrast, are static algebra at discrete time steps. The worm's expressiveness comes from <em>how</em> each neuron integrates information over time — not from how many of them there are.</p>
      <p>This is the seed of the Liquid story. Every later move — <span class="term" data-key="ltc">LTC</span>, <span class="term" data-key="cfc">CfC</span>, <span class="term" data-key="star">STAR</span>, the LFM line — can be traced back to "make the dynamics richer; you'll need fewer parameters."</p>
    `, drill:["1.2","1.7","8.5"]},

    {id:"1.2", title:"Liquid Time-constant Networks (LTCs, 2020)", html:`
      <p>The 2020 LTC paper formalized the insight. In an LTC, each neuron's time constant — how fast it integrates new input — is itself a function of the input. The network's behavior is described by an ordinary differential equation: <code>dx/dt = f(x, I, t, θ)</code> where <code>f</code> depends on the input <code>I</code>.</p>
      <p>Concretely: the network can <em>slow down</em> when an input is noisy and <em>speed up</em> when it changes meaningfully. Static transformers cannot do this — they have to learn it implicitly via many layers of attention.</p>
      <p>LTCs were dramatically smaller than transformers for control tasks: <span class="term" data-key="amini">Alexander Amini</span>'s MIT group used 19-neuron LTC networks to drive a real car. That demo became the visual shorthand for "tiny models, big behaviors" — and was widely re-shared even before Liquid AI the company existed.</p>
      <p>Cost: LTCs required ODE solvers at every inference step. Beautiful theory, slow runtime.</p>
    `, drill:["1.3","1.7"]},

    {id:"1.3", title:"Closed-form Continuous-time models (CfCs, 2022)", html:`
      <p>The CfC paper (Nature Machine Intelligence, 2022) removed the ODE solver. The authors found a closed-form approximation that preserved the input-dependent time-constant property while training and running orders of magnitude faster.</p>
      <p>This is the moment Liquid's theory became deployable. CfC made it plausible to scale the dynamics-rich approach to language-model sizes — which would otherwise have been impossible at any reasonable cost.</p>
      <p>CfC is also the reason the company can credibly say its architectures were <span class="term" data-key="discovered-not-compressed">discovered, not compressed</span>: the lineage goes worm → LTC → CfC → STAR → LFM, and none of those steps were "shrink a frontier model."</p>
    `, drill:["1.6","2.4","2.9"]},

    {id:"1.4", title:"Why 'Liquid'?", html:`
      <p>The name comes from the physics metaphor: a liquid changes shape continuously in response to its container, just as an <span class="term" data-key="lnn">LNN</span> changes its internal dynamics continuously in response to inputs.</p>
      <p>For marketing purposes the name has been double-edged. It is memorable and unique. But it also lets press shorthand it as "worm brains" (<span class="term" data-key="bloomberg-worm">Bloomberg</span>) — which is colorful but flattens the technical claim and creates a sticky meme that the company sometimes has to push back against.</p>
    `, drill:["8.5","12.5"]},

    {id:"1.5", title:"From LNNs to LFMs — what carried over, what was replaced", html:`
      <p>By 2024, when Liquid set out to build a foundation-model-scale system, the team confronted a tension. The LNN/CfC lineage is wonderful for control and time-series. But language modeling has a different structure — discrete tokens, long-range dependencies, autoregressive decoding.</p>
      <p>So they made a trade. From the LNN inheritance: the discipline of continuous, input-dependent dynamics, and the conviction that architectures matter more than scale. From elsewhere: attention (because language needs explicit long-range pointers) and <span class="term" data-key="gated-conv">gated convolutions</span> (because they're cheap and KV-cache-free).</p>
      <p>The first LFM (Sept 2024) was a mixed-architecture model. The second (LFM2, 2025) was the <span class="term" data-key="hybrid">hybrid</span> recipe found by <span class="term" data-key="star">STAR</span>: 10 gated short-conv blocks + 6 GQA blocks across 16 layers. That recipe is now the brand.</p>
      <div class="mm-callout"><div class="mm-label">Mental Model 2 in action</div>The choice of "just enough attention" defined a new trade-off — and Liquid spent 2025 making sure everyone described the category in those terms.</div>
    `, drill:["2.3","2.4","12.2"]},

    {id:"1.6", title:"STAR — Synthesis of Tailored Architectures", html:`
      <p>STAR (ICLR 2025 oral) is, internally, the most important piece of Liquid IP after the LFM weights themselves. It is an evolutionary, <strong>hardware-in-the-loop</strong> architecture search system.</p>
      <p>Translation: STAR proposes candidate architectures (mixing convs, attention, recurrences, gating, etc.), trains each one briefly on a target task, measures both quality and on-device throughput on the actual silicon (NPU / CPU / GPU), and evolves toward Pareto-optimal hybrids.</p>
      <p>STAR is the engine that lets Liquid claim its models are <strong>discovered, not compressed</strong>. The hybrid mix in LFM2 — 10 conv + 6 attention — is not a hand-designed recipe; it is the survivor of an evolutionary search constrained by real hardware.</p>
      <p>Strategic implications:</p>
      <ul>
        <li>STAR is closer to a moat than the model weights are. Weights can be replicated. A working hardware-in-the-loop search loop cannot easily be.</li>
        <li>Each new hardware partner (AMD, Apple, Qualcomm) is a new fitness landscape STAR can search against. This is part of why <span class="term" data-key="amd">AMD</span> led the Series A.</li>
        <li>Direct philosophical competitor: <span class="term" data-key="sakana">Sakana AI</span>.</li>
      </ul>
    `, drill:["2.4","2.9","4.8","7.2","5.2"]},

  {id:"m2", title:"Module 2 · Architecture deep dive", lessons:[
    {id:"2.1", title:"Why transformers struggle at the edge", html:`
      <p>Transformers have two scaling problems that matter on a phone or a car:</p>
      <ol>
        <li><strong>Quadratic attention.</strong> The cost of attention scales with the square of context length. Doubling the prompt quadruples the compute. On a battery-powered device, that translates directly to heat and millisecond latency.</li>
        <li><strong>The <span class="term" data-key="kv-cache">KV cache</span>.</strong> To decode efficiently, transformers cache the key/value vectors of every prior token. This cache grows linearly with context — and at 32K context, a 7B model needs <em>several gigabytes</em> of KV cache alone. Phones have ~4–8GB of total RAM.</li>
      </ol>
      <p>The big-tech response (Apple, Google, Meta) has been to keep transformers and lean on distillation and quantization. The Liquid response is to replace most of the attention with cheaper blocks while keeping just enough to handle long-range dependencies.</p>
      <p>Hold this fact: in <span class="term" data-key="lfm2">LFM2</span>, only ~20% of the layers are attention. In <span class="term" data-key="lfm25-8b">LFM2.5-8B-A1B</span>, the non-attention layers are explicitly <em>KV-cache-free</em>. That is the architectural pitch in one sentence.</p>
    `, drill:["2.2","2.4","2.5"]},

    {id:"2.2", title:"The non-transformer landscape", html:`
      <p>Liquid is not alone in betting against attention. Several families share the philosophy; understanding the map is essential before talking about LFM2 specifically.</p>
      <table>
        <tr><th>Family</th><th>Key example</th><th>What they replace attention with</th><th>Closest commercial expression</th></tr>
        <tr><td><span class="term" data-key="ssm">State-space</span></td><td><span class="term" data-key="mamba">Mamba</span></td><td>Selective linear recurrences</td><td><span class="term" data-key="cartesia">Cartesia</span> (voice); <span class="term" data-key="granite">Granite 4.0</span> hybrid; <span class="term" data-key="nemotron-h">Nemotron-H</span> hybrid</td></tr>
        <tr><td>Linear attention / RNN</td><td><span class="term" data-key="rwkv">RWKV</span></td><td>Linear-time recurrence with attention-flavored gating</td><td>Community models; embedded experiments</td></tr>
        <tr><td>Hybrid SSM+Transformer+MoE</td><td><span class="term" data-key="jamba">Jamba</span></td><td>Stacks SSM, attention, and MoE</td><td>AI21 enterprise long-context</td></tr>
        <tr><td>LNN/LFM lineage</td><td>LFM2</td><td>Gated short conv + minimal GQA</td><td>Liquid AI</td></tr>
        <tr><td>Evolutionary / biological search</td><td><span class="term" data-key="sakana">Sakana</span></td><td>Search across architectures and merges</td><td>Sakana research line</td></tr>
      </table>
      <p>The strategic point: there is a coherent <em>movement</em> away from pure attention. Liquid is the only player to combine that bet with (a) the LNN scientific lineage, (b) production proof in automotive, and (c) an architecture-search engine.</p>
    `, drill:["5.2","1.6"]},

    {id:"2.3", title:"LFM v1 (Sept 2024) — the first generation", html:`
      <p>The first <span class="term" data-key="lfm">LFM</span> release (Sept 2024) was a set of mixed-architecture foundation models targeted at the general LLM market — not yet narrowed to edge. The pitch then was 'general-purpose alternative to transformer foundation models.'</p>
      <p>Why this matters now: LFM v1 represents <strong>Phase 2</strong> of Liquid's market position (foundation-model challenger). Reading the original v1 launch materials, you can feel the company trying to fight on transformer territory — benchmark-for-benchmark.</p>
      <p>The decisive pivot came mid-2025. The company narrowed to edge, ditched the head-on benchmark fight, and re-emerged as the category leader for on-device. LFM2 is the artifact of that pivot.</p>
      <div class="mm-callout"><div class="mm-label">Mental Model 1 in action</div>The Phase 2 → Phase 3 narrowing is the cleanest example in this whole curriculum of <strong>set selection IS positioning</strong>. By removing themselves from the frontier-LLM set, Liquid stopped losing the benchmark fight and started leading a different category.</div>
    `, drill:["1.5","4.2","4.3","12.1"]},
