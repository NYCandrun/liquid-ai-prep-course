<script>
/* ============================================================
   LIQUID AI CURRICULUM — APP LOGIC
   ============================================================ */

(function(){
  // ----- State -----
  const STORE_KEY = "liquidai-curriculum-v1";
  const state = loadState();
  let currentPath = "linear";
  let currentLessonId = null;

  function loadState() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (!raw) return { read:{}, notes:{}, lastLesson:null };
      const parsed = JSON.parse(raw);
      return {
        read: parsed.read || {},
        notes: parsed.notes || {},
        lastLesson: parsed.lastLesson || null
      };
    } catch(e){ return { read:{}, notes:{}, lastLesson:null }; }
  }
  function saveState() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e){}
  }

  // ----- Flatten lessons for indexing -----
  const allLessons = [];
  const lessonById = {};
  MODULES.forEach(m => {
    m.lessons.forEach(l => {
      l.moduleId = m.id;
      l.moduleTitle = m.title;
      allLessons.push(l);
      lessonById[l.id] = l;
    });
  });

  // ----- Glossary auto-linker -----
  // Build matchable keys: keys + lowercased "term" first words
  const glossKeyIndex = {};
  Object.keys(GLOSSARY).forEach(k => { glossKeyIndex[k.toLowerCase()] = k; });
  // also map common labels -> key
  const labelToKey = {};
  Object.keys(GLOSSARY).forEach(k => {
    const term = GLOSSARY[k].term;
    // strip parenthetical
    const main = term.replace(/\s*\(.*?\)\s*/,"").trim();
    labelToKey[main.toLowerCase()] = k;
    labelToKey[term.toLowerCase()] = k;
  });

  // Linkify: find data-key on span.term and convert to anchors. Render handles this in HTML already.
  // For un-tagged occurrences of well-known terms, we conservatively skip auto-linking to avoid
  // over-linking — explicit data-key spans are the source of truth in lesson HTML.

  // ----- Render Nav Tree -----
  function renderNavLinear() {
    const nav = document.getElementById("navTree");
    nav.innerHTML = "";
    MODULES.forEach((mod, idx) => {
      const block = document.createElement("div");
      block.className = "nav-module" + (idx === 0 ? " open" : "");
      const title = document.createElement("div");
      title.className = "mod-title";
      title.innerHTML = `<span>${escapeHtml(mod.title)}</span><span class="chev">▾</span>`;
      title.onclick = () => block.classList.toggle("open");
      block.appendChild(title);

      const ul = document.createElement("ul");
      mod.lessons.forEach(l => {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = `${l.id} ${l.title}`;
        a.href = `#l-${l.id}`;
        a.dataset.lessonId = l.id;
        if (state.read[l.id]) a.classList.add("read");
        if (l.id === currentLessonId) a.classList.add("current");
        a.onclick = (e) => { e.preventDefault(); showLesson(l.id); };
        li.appendChild(a);
        ul.appendChild(li);
      });
      block.appendChild(ul);
      nav.appendChild(block);
    });
  }

  function renderNavPath(pathKey) {
    const path = PATHS[pathKey];
    const nav = document.getElementById("navTree");
    nav.innerHTML = "";

    const intro = document.createElement("div");
    intro.style.cssText = "background:#1c232c; padding:.6rem .7rem; border-radius:6px; margin:.2rem 0 .6rem; font-size:.78rem; color:#cbd1da; line-height:1.45;";
    intro.innerHTML = `<strong style="color:#9ec5ff;">${escapeHtml(path.label)}</strong><br>${escapeHtml(path.intro)}`;
    nav.appendChild(intro);

    const block = document.createElement("div");
    block.className = "nav-module open";
    const ul = document.createElement("ul");
    path.sequence.forEach(id => {
      const l = lessonById[id];
      if (!l) return;
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.textContent = `${l.id} ${l.title}`;
      a.href = `#l-${l.id}`;
      a.dataset.lessonId = l.id;
      if (state.read[l.id]) a.classList.add("read");
      if (l.id === currentLessonId) a.classList.add("current");
      a.onclick = (e) => { e.preventDefault(); showLesson(l.id); };
      li.appendChild(a);
      ul.appendChild(li);
    });
    block.appendChild(ul);
    nav.appendChild(block);
  }

  function refreshNav() {
    if (currentPath === "linear") renderNavLinear();
    else renderNavPath(currentPath);
  }

  // ----- Render Glossary panel -----
  function renderGlossary(filter) {
    const list = document.getElementById("glossList");
    list.innerHTML = "";
    const q = (filter || "").trim().toLowerCase();
    const keys = Object.keys(GLOSSARY).sort((a,b) =>
      GLOSSARY[a].term.localeCompare(GLOSSARY[b].term)
    );
    keys.forEach(k => {
      const g = GLOSSARY[k];
      if (q && !(g.term.toLowerCase().includes(q) || g.def.toLowerCase().includes(q))) return;
      const div = document.createElement("div");
      div.className = "gloss-entry";
      div.id = `gloss-${k}`;
      div.innerHTML = `<div class="gloss-term">${escapeHtml(g.term)}</div>
        <div class="gloss-def">${escapeHtml(g.def)}</div>`;
      list.appendChild(div);
    });
    if (!list.children.length) {
      list.innerHTML = '<div style="font-size:.82rem; color:#6a6f78; padding:.6rem;">No terms match.</div>';
    }
  }

  // ----- Lesson rendering -----
  function showLesson(lessonId) {
    const l = lessonById[lessonId];
    if (!l) return;
    currentLessonId = lessonId;
    state.lastLesson = lessonId;
    saveState();

    const container = document.getElementById("lessonContainer");
    const isRead = !!state.read[lessonId];

    // Mental-model tag detection from html
    const mmCount = (l.html.match(/mm-callout/g) || []).length;

    const crumbs = `${escapeHtml(l.moduleTitle)} › Lesson ${escapeHtml(l.id)}`;

    let drillHtml = "";
    if (l.drill && l.drill.length) {
      const items = l.drill.map(id => {
        const t = lessonById[id];
        if (!t) return "";
        return `<a href="#l-${id}" data-lesson-link="${id}">${escapeHtml(t.id)} · ${escapeHtml(t.title)}</a>`;
      }).join("");
      drillHtml = `
        <div class="drill-into">
          <h4>Drill into</h4>
          <div class="drill-row">${items}</div>
        </div>`;
    }

    const noteValue = state.notes[lessonId] || "";

    container.innerHTML = `
      <div class="crumbs">${crumbs}</div>
      <h1>${escapeHtml(l.title)}</h1>
      <div class="lesson-meta">
        ${mmCount ? `<span class="chip">${mmCount} mental-model callout${mmCount>1?'s':''}</span>` : ""}
        ${isRead ? `<span class="chip" style="background:#d6efd9; color:#2c5a32;">Marked read</span>` : ""}
      </div>
      <div class="lesson-body">${l.html}</div>
      ${drillHtml}
      <div class="lesson-actions">
        <button class="${isRead?'read-done':''}" id="toggleRead">${isRead?'✓ Read':'Mark as read'}</button>
        <button id="prevLesson">← Previous</button>
        <button id="nextLesson">Next →</button>
        <button id="printBtn">Print this lesson</button>
      </div>
      <div class="selfcheck notes">
        <h4>Personal notes${lessonId==='13.5'?' & gaps checklist':''}</h4>
        <textarea data-notes-for="${lessonId}" placeholder="Write what clicked, what's still murky, what you want to revisit. Saved automatically in your browser.">${escapeHtml(noteValue)}</textarea>
        <div style="font-size:.75rem; color:#6a6f78; margin-top:.3rem;"><span id="saveState"></span></div>
      </div>
    `;

    // Wire up actions
    document.getElementById("toggleRead").onclick = () => {
      if (state.read[lessonId]) delete state.read[lessonId];
      else state.read[lessonId] = Date.now();
      saveState();
      showLesson(lessonId);
      refreshNav();
      updateProgress();
    };
    document.getElementById("prevLesson").onclick = () => navigateLesson(-1);
    document.getElementById("nextLesson").onclick = () => navigateLesson(+1);
    document.getElementById("printBtn").onclick = () => window.print();

    const ta = container.querySelector("textarea[data-notes-for]");
    let saveTimer = null;
    ta.addEventListener("input", () => {
      state.notes[lessonId] = ta.value;
      clearTimeout(saveTimer);
      const ss = document.getElementById("saveState");
      ss.textContent = "Saving…";
      saveTimer = setTimeout(() => {
        saveState();
        ss.textContent = "Saved";
        setTimeout(()=>{ ss.textContent=""; }, 1500);
      }, 400);
    });

    // Wire up inline glossary terms
    wireTerms(container);

    // Cross-link drill-into clicks
    container.querySelectorAll("[data-lesson-link]").forEach(a => {
      a.onclick = (e) => { e.preventDefault(); showLesson(a.dataset.lessonLink); };
    });
    // Also wire any inline <a href="#l-x.y"> to use showLesson
    container.querySelectorAll('a[href^="#l-"]').forEach(a => {
      const targetId = a.getAttribute("href").substring(3);
      a.onclick = (e) => { e.preventDefault(); showLesson(targetId); };
    });

    // Mobile title
    document.getElementById("mobileTitle").textContent = `${l.id} · ${l.title}`;

    // Scroll
    window.scrollTo({top:0, behavior:"instant"});

    refreshNav();
    updateProgress();
  }

  function navigateLesson(dir) {
    // Use current path order if a path is active
    let sequence;
    if (currentPath === "linear") {
      sequence = allLessons.map(l => l.id);
    } else {
      sequence = PATHS[currentPath].sequence.slice();
    }
    const idx = sequence.indexOf(currentLessonId);
    if (idx === -1) {
      if (sequence.length) showLesson(sequence[0]);
      return;
    }
    const next = idx + dir;
    if (next >= 0 && next < sequence.length) showLesson(sequence[next]);
  }

  // ----- Inline term wiring -----
  function wireTerms(scope) {
    scope.querySelectorAll("span.term[data-key]").forEach(span => {
      const key = span.dataset.key;
      const g = GLOSSARY[key];
      if (!g) return;
      span.onmouseenter = (e) => showPopover(e, g, key);
      span.onmouseleave = () => hidePopoverSoon();
      span.onclick = (e) => {
        e.stopPropagation();
        openGlossary();
        const tgt = document.getElementById(`gloss-${key}`);
        if (tgt) {
          tgt.scrollIntoView({behavior:"smooth", block:"center"});
          tgt.style.background = "#fff2c8";
          setTimeout(()=>{ tgt.style.background = ""; }, 1800);
        }
      };
    });
  }

  // ----- Popover -----
  const pop = document.getElementById("popover");
  let popHideTimer = null;
  function showPopover(e, g, key) {
    clearTimeout(popHideTimer);
    pop.innerHTML = `<div class="pop-term">${escapeHtml(g.term)}</div>
      <div>${escapeHtml(g.def)}</div>
      <span class="pop-link" data-key="${key}">Open in glossary →</span>`;
    pop.style.display = "block";
    // Position
    const rect = e.target.getBoundingClientRect();
    const popW = 320;
    let left = rect.left + window.scrollX;
    if (left + popW > window.innerWidth - 20) left = window.innerWidth - popW - 20;
    pop.style.left = left + "px";
    pop.style.top = (rect.bottom + window.scrollY + 6) + "px";
    pop.onmouseenter = () => clearTimeout(popHideTimer);
    pop.onmouseleave = () => hidePopoverSoon();
    pop.querySelector(".pop-link").onclick = () => {
      openGlossary();
      const tgt = document.getElementById(`gloss-${key}`);
      if (tgt) tgt.scrollIntoView({behavior:"smooth", block:"center"});
      hidePopover();
    };
  }
  function hidePopoverSoon() {
    popHideTimer = setTimeout(()=>{ pop.style.display = "none"; }, 200);
  }
  function hidePopover() { pop.style.display = "none"; }

  // ----- Glossary panel toggle -----
  function openGlossary() {
    document.getElementById("glossaryPane").classList.add("open");
  }
  function toggleGlossary() {
    document.getElementById("glossaryPane").classList.toggle("open");
  }

  // ----- Progress -----
  function updateProgress() {
    const total = allLessons.length;
    const done = Object.keys(state.read).length;
    const pct = total ? Math.round((done/total)*100) : 0;
    document.getElementById("progressBar").style.width = pct + "%";
    document.getElementById("progressLabel").textContent = `${done} of ${total} lessons read · ${pct}%`;
  }

  // ----- Search -----
  function setupSearch() {
    const input = document.getElementById("searchInput");
    input.addEventListener("input", () => {
      const q = input.value.trim().toLowerCase();
      if (!q) { refreshNav(); return; }
      const nav = document.getElementById("navTree");
      nav.innerHTML = "";
      const hits = [];
      allLessons.forEach(l => {
        const hay = (l.id + " " + l.title + " " + stripHtml(l.html)).toLowerCase();
        if (hay.includes(q)) hits.push({l, score:(l.title.toLowerCase().includes(q)?2:1)});
      });
      hits.sort((a,b) => b.score - a.score);
      // Glossary hits
      const glossHits = [];
      Object.keys(GLOSSARY).forEach(k => {
        const g = GLOSSARY[k];
        if ((g.term + " " + g.def).toLowerCase().includes(q)) glossHits.push(k);
      });
      const div = document.createElement("div");
      div.style.padding = ".3rem 0";
      div.innerHTML = `<div style="font-size:.72rem; color:#7e8794; margin:.4rem 0 .2rem; text-transform:uppercase; letter-spacing:.6px;">${hits.length} lesson hit${hits.length===1?'':'s'}</div>`;
      const ul = document.createElement("ul");
      ul.style.cssText = "list-style:none; padding:0; margin:0;";
      hits.slice(0, 30).forEach(({l}) => {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = `${l.id} · ${l.title}`;
        a.href = "#";
        a.style.cssText = "display:block; padding:.25rem .4rem; color:#cbd1da; border-radius:4px; font-size:.85rem;";
        a.onmouseover = () => a.style.background = "#1c232c";
        a.onmouseout = () => a.style.background = "transparent";
        a.onclick = (e) => { e.preventDefault(); showLesson(l.id); };
        li.appendChild(a);
        ul.appendChild(li);
      });
      div.appendChild(ul);
      nav.appendChild(div);

      if (glossHits.length) {
        const g = document.createElement("div");
        g.innerHTML = `<div style="font-size:.72rem; color:#7e8794; margin:.7rem 0 .2rem; text-transform:uppercase; letter-spacing:.6px;">${glossHits.length} glossary hit${glossHits.length===1?'':'s'}</div>`;
        const gul = document.createElement("ul");
        gul.style.cssText = "list-style:none; padding:0; margin:0;";
        glossHits.slice(0, 20).forEach(k => {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.textContent = GLOSSARY[k].term;
          a.href = "#";
          a.style.cssText = "display:block; padding:.25rem .4rem; color:#9ec5ff; font-size:.82rem; border-radius:4px;";
          a.onmouseover = () => a.style.background = "#1c232c";
          a.onmouseout = () => a.style.background = "transparent";
          a.onclick = (e) => {
            e.preventDefault();
            openGlossary();
            const tgt = document.getElementById(`gloss-${k}`);
            if (tgt) {
              tgt.scrollIntoView({behavior:"smooth", block:"center"});
              tgt.style.background = "#fff2c8";
              setTimeout(()=>{ tgt.style.background = ""; }, 1800);
            }
          };
          li.appendChild(a);
          gul.appendChild(li);
        });
        g.appendChild(gul);
        nav.appendChild(g);
      }
    });
  }

  // ----- Path toggle -----
  function setupPathToggle() {
    document.querySelectorAll(".toolbar button[data-path]").forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll(".toolbar button[data-path]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentPath = btn.dataset.path;
        refreshNav();
        // Open the first lesson of the path if not in current path
        if (currentPath !== "linear" && PATHS[currentPath]) {
          const seq = PATHS[currentPath].sequence;
          if (!seq.includes(currentLessonId)) showLesson(seq[0]);
        }
      };
    });
  }

  // ----- Export & Reset -----
  function setupExport() {
    document.getElementById("exportBtn").onclick = () => {
      const lines = [];
      lines.push("# Liquid AI Curriculum — Personal export");
      lines.push("Generated " + new Date().toISOString());
      lines.push("");
      lines.push("## Progress");
      const total = allLessons.length;
      const done = Object.keys(state.read).length;
      lines.push(`Read ${done} of ${total} lessons (${Math.round(done*100/total)}%).`);
      lines.push("");
      lines.push("## Lessons marked read");
      allLessons.forEach(l => {
        if (state.read[l.id]) lines.push(`- ${l.id} ${l.title}`);
      });
      lines.push("");
      lines.push("## Notes");
      allLessons.forEach(l => {
        const n = state.notes[l.id];
        if (n && n.trim()) {
          lines.push(`### ${l.id} ${l.title}`);
          lines.push(n);
          lines.push("");
        }
      });
      const blob = new Blob([lines.join("\n")], {type:"text/markdown"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "liquid-ai-curriculum-notes.md";
      a.click();
      setTimeout(()=>URL.revokeObjectURL(url), 1000);
    };
    document.getElementById("resetBtn").onclick = () => {
      if (!confirm("Reset all read marks and notes? This cannot be undone.")) return;
      state.read = {}; state.notes = {}; state.lastLesson = null;
      saveState();
      refreshNav();
      updateProgress();
      if (currentLessonId) showLesson(currentLessonId);
    };
  }

  // ----- Glossary search -----
  function setupGlossarySearch() {
    document.getElementById("glossSearch").addEventListener("input", (e) => {
      renderGlossary(e.target.value);
    });
  }

  // ----- Keyboard shortcuts -----
  function setupKeyboard() {
    document.addEventListener("keydown", (e) => {
      const tag = (e.target.tagName || "").toLowerCase();
      if (tag === "input" || tag === "textarea") return;
      if (e.key === "g") { toggleGlossary(); e.preventDefault(); }
      else if (e.key === "/") { document.getElementById("searchInput").focus(); e.preventDefault(); }
      else if (e.key === "j") { navigateLesson(+1); e.preventDefault(); }
      else if (e.key === "k") { navigateLesson(-1); e.preventDefault(); }
      else if (e.key === "Escape") { hidePopover(); document.getElementById("glossaryPane").classList.remove("open"); document.getElementById("sidebar").classList.remove("open"); }
    });
  }

  // ----- Mobile -----
  function setupMobile() {
    document.getElementById("mobileMenu").onclick = () => {
      document.getElementById("sidebar").classList.toggle("open");
    };
    document.getElementById("mobileGloss").onclick = () => {
      toggleGlossary();
    };
  }

  // ----- Helpers -----
  function escapeHtml(s) {
    if (s == null) return "";
    return String(s).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    })[c]);
  }
  function stripHtml(html) {
    const tmp = document.createElement("div");
    tmp.innerHTML = html;
    return tmp.textContent || "";
  }

  // ----- Boot -----
  function boot() {
    renderGlossary();
    refreshNav();
    setupSearch();
    setupGlossarySearch();
    setupPathToggle();
    setupExport();
    setupKeyboard();
    setupMobile();
    updateProgress();

    // Show last lesson or 0.1
    const initial = state.lastLesson && lessonById[state.lastLesson] ? state.lastLesson : "0.1";
    showLesson(initial);

    // Close popover when clicking elsewhere
    document.body.addEventListener("click", (e) => {
      if (!e.target.closest(".term") && !e.target.closest(".popover")) hidePopover();
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();

</script>

</body>
</html>
