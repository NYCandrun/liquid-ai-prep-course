        <div class="stat"><div class="v">~20%</div><div class="l">Of layers are attention</div></div>
      </div>
      <p>The hybrid was not hand-designed. It was selected by <span class="term" data-key="star">STAR</span> from a search space of thousands of candidate architectures, evaluated on both quality and on-device throughput.</p>
      <p>Why this specific mix:</p>
      <ul>
        <li>The conv blocks have <strong>no <span class="term" data-key="kv-cache">KV cache</span></strong>. Memory stays roughly flat as context grows. This is the edge-AI bottleneck cracked open.</li>
        <li>The 6 attention blocks are <span class="term" data-key="gqa">GQA</span> (grouped-query) — already memory-thrifty — and are spaced through the network where long-range pointers are most useful.</li>
        <li>Gating gives the conv blocks input-dependent behavior — the LNN heritage shows up here, in spirit if not in equations.</li>
      </ul>
      <p>Sizes shipped in this generation: 350M, 700M, 1.2B, 2.6B parameters — all using the same hybrid recipe.</p>
    `, drill:["2.1","2.5","3.2","1.6","2.9"]},

    {id:"2.5", title:"LFM2.5-8B-A1B — MoE, zero-KV scale-up", html:`
      <p>Released May 28, 2026 (<a href="#l-11.1">May 2026 inflection</a>). The headline model of the LFM2.5 generation.</p>
      <div class="stat-grid">
        <div class="stat"><div class="v">8.3B</div><div class="l">Total parameters</div></div>
        <div class="stat"><div class="v">1.5B</div><div class="l">Active per token</div></div>
        <div class="stat"><div class="v">128K</div><div class="l">Context length</div></div>
        <div class="stat"><div class="v">38T</div><div class="l">Training tokens</div></div>
        <div class="stat"><div class="v">24</div><div class="l">Total layers</div></div>
        <div class="stat"><div class="v">18 + 6</div><div class="l">Linear-conv (zero KV) + GQA</div></div>
      </div>
      <p>Three things to notice:</p>
      <ol>
        <li><strong><span class="term" data-key="moe">MoE</span> goes edge.</strong> Sparse activation lets the model carry 8.3B worth of knowledge but only pay for 1.5B at inference time. This is the same trick frontier models use — Liquid is bringing it down-stack.</li>
        <li><strong>Zero KV cache for 75% of the layers.</strong> The 18 linear-conv layers don't accumulate KV state. Memory at 128K context is dramatically below a same-size transformer.</li>
        <li><strong>128K context on-device.</strong> Closes most of the <a href="#l-10.4">context-length gap</a> versus frontier models (still 256K–1M, but the gap matters less on phones).</li>
      </ol>
    `, drill:["2.4","3.5","10.4","11.1"]},

    {id:"2.6", title:"LFM2-VL — vision-language", html:`
      <p>The vision-language variant uses Google DeepMind's <span class="term" data-key="naflex">SigLIP2 / NaFlex</span> as the image encoder. NaFlex handles variable resolution natively, so the encoder doesn't waste compute on padding.</p>
      <p>The composition pattern is familiar: existing best-of-class vision encoder, Liquid's hybrid backbone for the language side. This makes LFM2-VL deployable in wearables (<span class="term" data-key="brilliant">Brilliant Labs</span>) where every milliwatt counts.</p>
    `, drill:["3.3","6.4","7.4"]},

    {id:"2.7", title:"Training pipeline — pre-train, mid-train, SFT, DPO", html:`
      <ol>
        <li><strong>Pre-training</strong> on web-scale text (typically 5T–38T tokens depending on the model). Standard next-token loss.</li>
        <li><strong><span class="term" data-key="mid-train">Mid-training</span></strong> on a curated, high-quality, harder-than-average mix. This step is unusually emphasized in Liquid's public materials; most labs don't name it separately.</li>
        <li><strong><span class="term" data-key="sft">SFT</span></strong> on instruction/response data.</li>
        <li><strong><span class="term" data-key="dpo">DPO</span></strong> for preference alignment — specifically <span class="term" data-key="length-norm">length-normalized DPO</span> to avoid the length-bias trap.</li>
      </ol>
      <p>The detail you want to carry: <strong>length-normalized DPO</strong>. Models trained with naive DPO tend to learn "longer answers are better." Length-normalization corrects for that. It's a small technical choice with an outsized effect on conversational feel — which matters more for an Apollo-style consumer app than for an enterprise API.</p>
    `, drill:["3.8","3.10"]},

    {id:"2.8", title:"Quantization & deployment formats", html:`
      <p>An LFM2-1.2B model in FP16 is ~2.4GB; quantized to Q4, it fits comfortably under 800MB. Liquid ships across formats:</p>
      <ul>
        <li><span class="term" data-key="gguf">GGUF</span> — runs in llama.cpp / LM Studio / Ollama. The community surface.</li>
        <li><span class="term" data-key="executorch">ExecuTorch</span> — Meta's PyTorch on-device runtime.</li>
        <li><span class="term" data-key="mlx">MLX</span> — Apple Silicon.</li>
        <li>LEAP / LiquidKit native — when you want the full SDK and want Liquid to manage the dispatch.</li>
      </ul>
      <p>Strategic tension: shipping in commodity formats is necessary for adoption but accelerates <a href="#l-10.6">runtime commoditization</a> — the model becomes interchangeable with any other GGUF blob.</p>
    `, drill:["3.7","3.9","10.6"]},

    {id:"2.9", title:"'Discovered, not compressed' — the central claim", html:`
      <p>Most edge SLMs are distilled. <span class="term" data-key="phi-4">Phi-4</span>, <span class="term" data-key="gemma-3n">Gemma 3n</span>, <span class="term" data-key="llama-3.2">Llama 3.2</span> all take a large teacher model and train a smaller student to imitate it. The student inherits the teacher's behaviors but rarely its <em>efficiency</em> — it's a transformer pretending to be small.</p>
      <p>LFM2 was not distilled. It was designed natively at its target size, with an architecture <span class="term" data-key="star">STAR</span> selected for that size, on the hardware it was meant to run on. That difference is the bedrock of the differentiation story.</p>
      <p>How to defend the claim under interrogation:</p>
      <ul>
        <li><em>"How do you know LFM2 isn't just a fancy transformer?"</em> — Show the layer recipe (10 conv + 6 attention), point at zero KV in the conv layers, and the fact that quality at 700M is competitive with distilled 3B models on edge benchmarks.</li>
        <li><em>"Couldn't anyone build this?"</em> — In theory yes; in practice no, because <span class="term" data-key="star">STAR</span> is the part you'd need to replicate, and STAR requires a working hardware-in-the-loop training pipeline.</li>
      </ul>
      <div class="mm-callout"><div class="mm-label">Mental Model 2</div>"Discovered, not compressed" is the trade-off Liquid is trying to make load-bearing. If buyers accept it as the right axis, distillation-based SLMs are answering the wrong question.</div>
    `, drill:["1.6","9.2","12.2"]}
  ]},

  /* ===== Module 3 ===== */
  {id:"m3", title:"Module 3 · The product surface", lessons:[
    {id:"3.1", title:"Model family map — 33 SKUs at a glance", html:`
      <p>The product surface is wider than it first looks. Across base, vision, audio, thinking, and Nanos, Liquid ships roughly 33 distinct SKUs.</p>
      <table>
        <tr><th>Generation</th><th>Family</th><th>Sizes</th><th>Notes</th></tr>
        <tr><td>LFM v1</td><td>Base</td><td>1.3B / 3B / 40B-MoE</td><td>Sept 2024. Phase-2 challenger.</td></tr>
        <tr><td>LFM2</td><td>Base</td><td>350M / 700M / 1.2B / 2.6B</td><td>Hybrid; the edge category-leader generation.</td></tr>
        <tr><td>LFM2-VL</td><td>Vision-Language</td><td>450M / 1.6B</td><td>SigLIP2 NaFlex encoder.</td></tr>
        <tr><td>LFM2-Audio</td><td>Audio</td><td>1.5B</td><td>October 2025.</td></tr>
        <tr><td>LFM2.5</td><td>Base / MoE / Thinking</td><td>1.2B-Thinking, 8B-A1B</td><td>Current flagship generation.</td></tr>
        <tr><td>Nanos</td><td>Task-specific</td><td>~350M class</td><td>JSON, function-calling, translation, extraction.</td></tr>
      </table>
      <p>Read this map as a layered offering: <strong>Apollo</strong> as the consumer face, <strong>LFM2/2.5 base</strong> as the developer default, <strong>VL/Audio</strong> as modality extensions, <strong>Nanos</strong> as drop-in task replacements, <strong>LEAP</strong> as the runtime, <strong>LiquidKit</strong> as the embeddable.</p>
    `, drill:["3.2","3.3","3.4","3.5","3.6","3.7","3.8","3.9"]},

    {id:"3.2", title:"LFM2 base models", html:`
      <p>The four sizes (350M / 700M / 1.2B / 2.6B) cover roughly four hardware tiers:</p>
      <ul>
        <li><strong>350M</strong> — microcontrollers, wearables, ultra-low-power. Fits in tens of MB quantized.</li>
        <li><strong>700M</strong> — mid-range phones, IoT gateways. The "default" recommendation for many embedded use cases.</li>
        <li><strong>1.2B</strong> — flagship phones, automotive head units, laptop background tasks.</li>
        <li><strong>2.6B</strong> — premium PC, Copilot+ machines, on-prem servers in workstation class.</li>
      </ul>
      <p>The pricing question buyers actually ask isn't "what's your benchmark," it's "what's the smallest size that gets me to acceptable quality on this hardware." Liquid's hybrid recipe lets the same architectural story scale down further than distilled rivals.</p>
    `, drill:["2.4","6.2","6.3","6.6"]},

    {id:"3.3", title:"LFM2-VL — vision-language deployment", html:`
      <p>Two sizes: 450M and 1.6B. The 450M variant matters because it fits in wearables (e.g. <span class="term" data-key="brilliant">Brilliant Labs</span>) where the entire compute budget might be sub-watt and the memory budget is hundreds of MB.</p>
      <p>The vision encoder is <span class="term" data-key="naflex">SigLIP2 NaFlex</span> — not Liquid IP. The decision to use a Google-DeepMind encoder rather than build their own is a focus decision: spend the lab's architecture-search budget on the language backbone, where the LNN heritage gives real differentiation.</p>
    `, drill:["2.6","6.4","7.4"]},

    {id:"3.4", title:"LFM2-Audio-1.5B", html:`
      <p>Released October 2025. Liquid's challenge to Cartesia and OpenAI Whisper specifically <em>at the edge</em>.</p>
      <p>The competitive dynamic here is the most uncomfortable Liquid faces. <span class="term" data-key="cartesia">Cartesia</span> is a fellow non-transformer believer (Mamba lineage), and their audio quality is widely regarded as best-in-class. Liquid's audio story is therefore <em>narrower</em>: it competes on integration with the rest of the LFM ecosystem, not on raw audio quality.</p>
    `, drill:["10.8","5.2"]},

    {id:"3.5", title:"LFM2.5 — Thinking and 8B-A1B", html:`
      <p>The LFM2.5 generation introduces two new ideas: explicit reasoning chains, and MoE on-device.</p>
      <h4>LFM2.5-1.2B-Thinking</h4>
      <p>Fits in 900MB. Trained to produce chain-of-thought traces and is the first credible reasoning model that runs in a phone's RAM budget. The strategic point is that "reasoning" had been a frontier-model differentiator until late 2025; Thinking brings it down to the edge.</p>
      <h4>LFM2.5-8B-A1B (see <a href="#l-2.5">2.5</a>)</h4>
      <p>24-layer MoE, 8.3B total / 1.5B active, 128K context, 38T training tokens.</p>
    `, drill:["2.5","9.3","11.1"]},

    {id:"3.6", title:"Nanos — task-specific micro-models", html:`
      <p>Nanos are 350M-class models, each fine-tuned for one job: structured-output JSON extraction, function/tool calling, translation between specific language pairs, etc.</p>
      <p>Why they exist: a properly fine-tuned 350M Nano can outperform a general-purpose 3B model on its specific task, while using less than 1/10 the energy. For mobile and IoT, that's the gap between "feasible feature" and "battery killer."</p>
      <p>Competitive shadow: this is the same pattern <span class="term" data-key="arcee">Arcee</span> ships with their domain-merged SuperNova models, and <span class="term" data-key="nexa">Nexa</span> with their task adapters.</p>
    `, drill:["5.3","6.6","2.9"]},

    {id:"3.7", title:"LEAP — the Liquid Edge AI Platform", html:`
      <p>LEAP is the SDK + runtime + model zoo. It is how a developer actually ships an LFM into an iOS / Android / Windows / Linux app.</p>
      <p>What LEAP does:</p>
      <ul>
        <li>Downloads and manages the right-sized quantized LFM for the target device.</li>
        <li>Dispatches inference across <span class="term" data-key="tri-engine">CPU/GPU/NPU</span> (especially on Ryzen AI tri-engine machines).</li>
        <li>Exposes a uniform API across modalities (text, vision, audio).</li>
      </ul>
      <p>LEAP is where the AMD partnership shows up most concretely — and where commoditization pressure also shows up: see <a href="#l-10.6">10.6</a>.</p>
    `, drill:["7.2","3.9","10.6","6.2"]},

    {id:"3.8", title:"Apollo — the consumer face", html:`
      <p>Apollo is a free iOS chat app running LFM2 entirely on-device. It is Liquid's consumer brand asset — and arguably the highest-leverage marketing surface they have.</p>
      <p>What Apollo accomplishes:</p>
      <ul>
        <li><strong>Proof.</strong> Anyone can install it and feel real on-device latency and offline behavior. That's hard to argue with.</li>
        <li><strong>Distribution.</strong> Brings the brand to consumers without needing TV-budget marketing.</li>
        <li><strong>Telemetry.</strong> Real-world feedback loop on how LFMs behave on real phones (within privacy constraints).</li>
      </ul>
      <p>What Apollo lacks: consumer-review coverage. The <a href="#l-8.5">external coverage map</a> has almost no consumer-product reviews of Apollo — a coverage gap and (per Mental Model 5) a brand cost.</p>
    `, drill:["8.5","8.6","12.5","6.3"]},

    {id:"3.9", title:"LiquidKit — native SDKs", html:`
      <p>Native Swift and Kotlin libraries. Lets a mobile developer add LFM inference with a few lines of code, without dealing with quantization formats or runtime selection.</p>
      <p>The competitor here is <span class="term" data-key="cactus">Cactus</span>, which offers a similar embedded SDK story. Differentiation comes down to (a) which models you can ship with and (b) how well the SDK integrates with the underlying runtime on each device — exactly where LEAP's hardware partnerships help.</p>
    `, drill:["3.7","5.3"]},

    {id:"3.10", title:"Licensing — the $10M threshold", html:`
      <p>The <span class="term" data-key="lfm-license">LFM Open License v1.0</span> is permissive for organizations with less than $10M annual revenue. Above that threshold, a commercial license is required.</p>
      <p>Read this as a business-model statement, not a legal one.</p>
      <div class="mm-callout"><div class="mm-label">Mental Model 4</div>License choice IS business model choice. The $10M threshold says: <strong>we want a small number of large commercial relationships</strong>, not thousands of mid-market deals. It is structurally incompatible with a self-serve PLG motion.</div>
      <p>Implications:</p>
      <ul>
        <li>Sales motion has to be enterprise (long cycle, high ACV).</li>
        <li>Indie developers and prosumers can experiment freely — good for community.</li>
        <li>Mid-market ($10M–$100M ARR companies) are in an awkward middle: too big for free, too small to want a custom contract. Many will choose <span class="term" data-key="qwen3">Qwen3</span> or <span class="term" data-key="llama-3.2">Llama 3.2</span> instead.</li>
        <li>Changing the license later is expensive — you can't ungrant a permission you've already given.</li>
      </ul>
    `, drill:["10.1","12.4","4.8"]}
  ]},

  /* ===== Module 4 ===== */
  {id:"m4", title:"Module 4 · Market position and the three-phase story", lessons:[
    {id:"4.1", title:"Phase 1 (2020–2023) — architectural curiosity", html:`
      <p>From the LTC paper through CfC and into the early MIT CSAIL demos, Liquid AI was not yet a company in any commercial sense. It was an architecture thread — interesting to a small academic audience, occasionally surfaced by science press for the worm-brain hook.</p>
      <p>Hold this phase in mind because the language of architecture-as-science is what gives Liquid permission to make its <a href="#l-2.9">"discovered, not compressed"</a> claim today. Most competitors don't have a multi-year peer-reviewed lineage to point at.</p>
    `, drill:["1.1","1.2","1.3"]},

    {id:"4.2", title:"Phase 2 (Sept 2024 – mid 2025) — foundation-model challenger", html:`
      <p>The September 2024 LFM v1 launch announced Liquid as a foundation-model lab. The framing was deliberately general-purpose: "an alternative to transformer foundation models."</p>
      <p>This positioning struggled. Liquid was being compared head-on with GPT-4, Claude, Gemini — and lost most benchmark fights. The press response was admiring-but-skeptical (see <a href="#l-8.5">VentureBeat coverage</a>): great science, unclear if it can scale.</p>
      <p>The financial event of this phase was the <strong>$250M Series A led by AMD</strong> in December 2024. That round both confirmed the foundation-model narrative and quietly seeded the next pivot: AMD's interest was specifically in on-device inference on Ryzen AI silicon.</p>
    `, drill:["2.3","7.2","8.5"]},

    {id:"4.3", title:"Phase 3 (mid 2025 onward) — edge AI category leader", html:`
      <p>Mid-2025 is when the strategy narrowed. The LFM2 launch reframed Liquid not as a general foundation-model challenger but as the leader of a different category: edge / on-device AI.</p>
      <p>What changed:</p>
      <ul>
        <li><strong>Set selection.</strong> Stopped acknowledging frontier labs as direct competitors in marketing; explicitly positioned against Apple AFM, Gemini Nano, Llama 3.2 on-device.</li>
        <li><strong>Trade-off frame.</strong> Privacy / latency / offline replaced raw benchmark scores as the primary axis.</li>
        <li><strong>Proof points.</strong> Mercedes-Benz MBUX took center stage; AMD CES keynote slot booked.</li>
        <li><strong>Product surface.</strong> Apollo, LEAP, LiquidKit launched as the developer + consumer face.</li>
      </ul>
      <div class="mm-callout"><div class="mm-label">Mental Model 1</div>This pivot is the textbook example. Liquid did not get better at the benchmark fight — they declined to be in it. <strong>Competitive set selection IS positioning.</strong></div>
    `, drill:["2.4","5.1","9.1","12.1"]},

    {id:"4.4", title:"Why edge, why now", html:`
      <p>Three forces converged in 2024-2026 to make on-device viable as a category:</p>
      <ol>
        <li><strong>Hardware.</strong> Apple A17/A18, Snapdragon 8 Gen 4, Ryzen AI all crossed the 40+ TOPS NPU threshold. Real models can run.</li>
        <li><strong>Regulation.</strong> EU AI Act, GDPR enforcement, China data-residency rules. Cloud LLM inference exposes personal data; on-device avoids the question.</li>
        <li><strong>Cost.</strong> Cloud LLM inference at scale is expensive. <a href="#l-4.5">Lenovo's analysis</a> puts on-prem at 8× cheaper than cloud IaaS for sustained workloads. On-device is free at the margin.</li>
      </ol>
      <p>None of these are Liquid-specific tailwinds. But they make the category big enough to support a credible challenger — and Liquid is the most architecturally distinct candidate for that role.</p>
    `, drill:["4.5","11.1","6.1","6.2"]},

    {id:"4.5", title:"TAM, CAGR, and the size of the opportunity", html:`
      <div class="stat-grid">
        <div class="stat"><div class="v">$35.8B</div><div class="l">Edge AI market 2025</div></div>
        <div class="stat"><div class="v">$385.9B</div><div class="l">Edge AI market 2034</div></div>
        <div class="stat"><div class="v">29.9%</div><div class="l">Edge AI CAGR</div></div>
        <div class="stat"><div class="v">$8.6B → $58B</div><div class="l">SLM market growth</div></div>
        <div class="stat"><div class="v">$7.6T</div><div class="l">Goldman AI capex 2026-2031</div></div>
        <div class="stat"><div class="v">8×</div><div class="l">Lenovo on-prem vs cloud IaaS</div></div>
      </div>
      <p>Read these numbers carefully. The $7.6T capex headline can be misread as cloud-only — it isn't. Roughly 15–20% of that figure represents edge silicon (NPUs in phones, PCs, cars). Even a modest share of that becomes an enormous floor for the on-device model market.</p>
    `, drill:["4.4","4.7"]},

    {id:"4.6", title:"What the $7.6T capex story means for edge", html:`
      <p>The Goldman headline is usually framed as a cloud datacenter buildout. Liquid's gloss on it: <strong>that buildout will create the demand for edge inference, not compete with it.</strong></p>
      <p>Why: most users will not pay per-token cloud prices for routine assistant queries. Cloud capex builds the high-end (training, complex reasoning, agentic orchestration); edge serves the long tail of routine inference where cost-per-query has to be effectively zero.</p>
      <p>Hasani's position (see <a href="#l-4.7">4.7</a>) leans into this: "edge complements cloud."</p>
    `, drill:["4.7","11.1"]},

    {id:"4.7", title:"Hasani's thesis — efficient embedded intelligence COMPLEMENTS cloud LLMs", html:`
      <blockquote>The cloud will keep doing what only the cloud can do — frontier reasoning, agentic orchestration, search-grade synthesis. The device will keep doing what only the device can do — instant, private, offline, energy-cheap. Both grow. The interface between them is the new product category.</blockquote>
      <p>This framing is strategically clever. It avoids the trap of "edge vs cloud" zero-sum framing — which would put Liquid in a fight it can't win — and instead positions Liquid as <em>essential infrastructure for the cloud labs' own users</em>. Apple, Google, Microsoft all want on-device inference for latency, cost, and privacy reasons; Liquid offers it without them needing to build it.</p>
    `, drill:["4.6","9.1","9.3"]},

    {id:"4.8", title:"Two structural advantages — AMD moat and flagship proof points", html:`
      <p>If you had to name what's most defensible about Liquid in mid-2026, the honest answer is two things:</p>
      <h4>1. AMD hardware-aligned distribution moat</h4>
      <p>AMD didn't just invest — they made Liquid the day-zero LLM partner on Ryzen AI. Every Copilot+ AMD PC sold in 2026 ships with the option to run LFMs out of the box. That is distribution at a scale no Ring 2 specialist can match without a similar partnership.</p>
      <h4>2. Flagship production proof points</h4>
      <p>Mercedes-Benz (automotive), AMD (PC), Shopify (e-commerce), Brilliant Labs (wearable), Insilico (pharma), G42 (sovereign). Six different verticals, each a credible reference. No other Ring 2 player has this density of named production deployments.</p>
      <div class="mm-callout"><div class="mm-label">Mental Models 3 + 6</div>Both advantages have time pressure. AMD partnerships can be matched by Intel/Qualcomm. Mercedes proof has an 18–24-month half-life. The structural advantages are real <em>and</em> they need maintenance.</div>
    `, drill:["7.1","7.2","12.3","12.6"]}
  ]},

  /* ===== Module 5 ===== */
  {id:"m5", title:"Module 5 · The five competitive rings", lessons:[
    {id:"5.1", title:"How to use rings — segmentation IS positioning", html:`
      <p>The five-ring model is Liquid's internal map of who they compete with. It is not industry-standard — it is a Liquid-built framing that does a strategic job.</p>
      <p>The trick is that the rings are <strong>concentric</strong>. Ring 1 is the closest philosophical neighbor (other non-transformer architectures). Ring 5 is the farthest (frontier labs). Buyers compare Liquid mostly to Rings 2-3-4. By naming Ring 1 explicitly, Liquid claims architectural kinship with Mamba/Jamba/RWKV — which is flattering and unusual coming from a vendor.</p>
      <div class="mm-callout"><div class="mm-label">Mental Model 1</div>The choice to use rings at all — rather than a "magic quadrant" or a "competitor table" — is itself the positioning move. Rings imply gradient and overlap; a quadrant implies winners and losers. Liquid prefers the former framing because they are not (yet) the obvious winner in any 2×2.</div>
    `, drill:["5.2","5.3","5.4","5.5","5.6","12.1"]},

    {id:"5.2", title:"Ring 1 — non-transformer rivals", html:`
      <p>The architectural near-neighbors. These are companies and projects Liquid will be lumped with in any "post-transformer" press cycle.</p>
      <table>
        <tr><th>Player</th><th>Architecture</th><th>What they own</th><th>What Liquid owns vs them</th></tr>
        <tr><td><span class="term" data-key="cartesia">Cartesia</span></td><td>Mamba SSM (voice)</td><td>Best-in-class real-time voice</td><td>Breadth across modalities, edge integration, automotive proof</td></tr>
        <tr><td><span class="term" data-key="jamba">AI21 Jamba</span></td><td>SSM + Transformer + MoE hybrid</td><td>Long-context enterprise</td><td>Mobile/embedded; smaller absolute size</td></tr>
        <tr><td><span class="term" data-key="granite">IBM Granite 4.0</span></td><td>Hybrid Mamba/transformer</td><td>Enterprise certifications (SOC 2, ISO)</td><td>Architectural ambition; better consumer story</td></tr>
        <tr><td><span class="term" data-key="nemotron-h">Nemotron-H (NVIDIA)</span></td><td>Hybrid SSM-attention</td><td>NVIDIA hardware alignment</td><td>AMD hardware alignment; not GPU-locked</td></tr>
        <tr><td><span class="term" data-key="rwkv">RWKV</span></td><td>RNN-attention hybrid</td><td>Community, open weights, small footprint</td><td>Production deployments, polish</td></tr>
        <tr><td><span class="term" data-key="sakana">Sakana AI</span></td><td>Evolutionary search / merges</td><td>Most direct STAR competitor philosophically</td><td>Commercial product surface; no Sakana edge SKU yet</td></tr>
      </table>
      <p>Liquid <em>likes</em> being categorized with these players because it reinforces the "post-transformer" narrative. The PR strategy explicitly amplifies this group (see <a href="#l-8.3">messaging pillar 4</a>).</p>
    `, drill:["2.2","8.3","10.8"]},

    {id:"5.3", title:"Ring 2 — edge specialists (where the real fight is)", html:`
      <p>Ring 2 is where Liquid <strong>actually competes for deals.</strong> These are companies whose entire business is on-device or near-device AI.</p>
      <table>
        <tr><th>Player</th><th>Differentiator</th><th>Threat to Liquid</th></tr>
        <tr><td><span class="term" data-key="webai">webAI</span> ($2.5B valuation)</td><td>Apple Silicon optimization, enterprise distribution</td><td>Biggest direct competitor by valuation; targets same Mac/iOS dev base</td></tr>
        <tr><td><span class="term" data-key="arcee">Arcee</span></td><td>Domain-merged SuperNova models, strong enterprise GTM</td><td>Eats into mid-market and regulated industries</td></tr>
        <tr><td><span class="term" data-key="nexa">Nexa</span></td><td>Agentic on-device platform, very active product cadence</td><td>Threatens Liquid's "agentic edge" narrative in May 2026 wave</td></tr>
        <tr><td><span class="term" data-key="cactus">Cactus</span></td><td>Embedded SDK (Swift/Kotlin)</td><td>Direct LEAP/LiquidKit competitor</td></tr>
        <tr><td><span class="term" data-key="qualcomm-hub">Qualcomm AI Hub</span></td><td>Snapdragon NPU distribution</td><td>If you're on Android phones, you go through here — strategic chokepoint</td></tr>
        <tr><td><span class="term" data-key="fastflowlm">FastFlowLM</span></td><td>AMD-aligned NPU runtime</td><td>Runtime commoditization (Vulnerability 6)</td></tr>
        <tr><td><span class="term" data-key="huggingface">Hugging Face</span></td><td>Distribution + SmolLM3</td><td>Indispensable distribution channel and modest direct competitor</td></tr>
        <tr><td><span class="term" data-key="baseten">Baseten</span></td><td>Inference platform</td><td>Server-side deployment competitor</td></tr>
      </table>
      <p>If you spend your time on only one ring, spend it here. Most lost deals will be lost to Ring 2.</p>
    `, drill:["10.6","11.2","6.2","6.3"]},

    {id:"5.4", title:"Ring 3 — big tech on-device", html:`
      <p>The platform owners. They distribute on-device models as default features of the operating system or developer SDK.</p>
      <table>
        <tr><th>Player</th><th>Asset</th><th>What it means for Liquid</th></tr>
        <tr><td><span class="term" data-key="apple-afm">Apple AFM 3</span></td><td>Default model on every iOS device, exposed via on-device Foundation Models framework</td><td>Most existential threat. If Apple's default is "good enough," third-party LFMs become optional.</td></tr>
        <tr><td><span class="term" data-key="gemini-nano">Gemini Nano</span> + <span class="term" data-key="gemma-3n">Gemma 3n</span> + <span class="term" data-key="gemma-4">Gemma 4</span></td><td>AICore on Android; open Gemma family</td><td>Closes the Android side analogously; Gemma 4 (May 2026) sharply raises the open-weight bar.</td></tr>
        <tr><td><span class="term" data-key="phi-4">Microsoft Phi-4</span></td><td>Strong reasoning at SLM size; Copilot+ default for non-AMD Windows</td><td>Direct alternative on Windows; pivot toward agentic edge in May 2026 (<a href="#l-11.2">11.2</a>)</td></tr>
        <tr><td><span class="term" data-key="llama-3.2">Meta Llama 3.2</span> + <span class="term" data-key="muse-spark">Muse Spark</span></td><td>Default on-device open-weight choice; Muse Spark adds agentic edge</td><td>Free; ubiquitous; sets community expectations</td></tr>
      </table>
      <p>Strategic posture: Liquid does not try to displace these on their own turf. Instead, the pitch is "we work better than the OS default <em>when you care about</em> [latency / privacy / customization / multi-platform]." Picking a ring you can't beat head-on and reframing the trade-off is the textbook Mental Model 2 play.</p>
    `, drill:["6.3","6.2","12.2","11.2"]},

    {id:"5.5", title:"Ring 4 — open-weight SLMs", html:`
      <p>The community-darling, benchmark-leading open releases. Cheap, very permissive licenses, often Chinese-origin and aggressively iterated.</p>
      <ul>
        <li><span class="term" data-key="qwen3">Qwen3 / 3.5 / 3.7 (Alibaba)</span> — the most aggressive open-weight player by far. Excellent benchmarks at small sizes, Apache-2.0-style license. Eats into mid-market deals.</li>
        <li><span class="term" data-key="ministral">Mistral Ministral 3</span> — European, well-regarded, strong on-device performance.</li>
        <li><span class="term" data-key="gemma-3n">Gemma 3n</span> — Google's open contribution; overlaps with Ring 3.</li>
        <li><span class="term" data-key="smollm3">SmolLM3 (HF)</span> — small but credible.</li>
        <li><span class="term" data-key="deepseek">DeepSeek</span> — frontier-aligned releases that have small/distilled variants.</li>
      </ul>
      <p>Notice the Belcak SLM thesis (Microsoft Research, 2025) sits behind this whole ring: <em>"Small language models are the future of agentic AI."</em> The community broadly agrees. Liquid agrees in <em>direction</em> but resists the SLM label — they prefer "foundation model" because it preserves architectural framing.</p>
    `, drill:["3.10","9.2","11.1"]},

    {id:"5.6", title:"Ring 5 — frontier labs", html:`
      <p>OpenAI, Anthropic, Google DeepMind, Meta FAIR. Liquid does not compete with them. The Phase 3 pivot (<a href="#l-4.3">4.3</a>) was specifically about <em>refusing</em> to compete with them.</p>
      <p>But you should track them for three reasons:</p>
      <ol>
        <li><strong>Talent flow.</strong> Researchers leave frontier labs to do edge work. Each move reshapes Ring 2.</li>
        <li><strong>Distillation pressure.</strong> Frontier teachers feed the entire SLM ecosystem (Ring 4 especially).</li>
        <li><strong>Agentic orchestration.</strong> When the frontier labs start specifying "and we hand off X to an on-device model," they choose who lives in that handoff slot. That's the most lucrative integration point on the map.</li>
      </ol>
    `, drill:["11.3","4.7"]},

    {id:"5.7", title:"Cross-ring view — who is winning which trade-off", html:`
      <table>
        <tr><th>Trade-off axis</th><th>Current leader</th><th>Liquid position</th></tr>
        <tr><td>Raw benchmark (general)</td><td>Frontier labs (Ring 5)</td><td>Liquid declines to fight here</td></tr>
        <tr><td>Open-weight benchmark / size</td><td>Qwen3 (Ring 4)</td><td>Close; license is the actual differentiator</td></tr>
        <tr><td>OS-default ubiquity</td><td>Apple AFM, Gemini Nano (Ring 3)</td><td>Liquid loses; competes by being cross-platform</td></tr>
        <tr><td>Privacy / offline / on-device</td><td>Liquid (claimed)</td><td>Contestable by Apple AFM and webAI</td></tr>
        <tr><td>Edge latency, automotive</td><td>Liquid (Mercedes proof)</td><td>Defensible for 18–24 months</td></tr>
        <tr><td>Edge audio quality</td><td>Cartesia (Ring 1)</td><td>Liquid concedes on quality, competes on integration</td></tr>
        <tr><td>Architecture novelty</td><td>Liquid + Sakana (Ring 1)</td><td>Liquid owns the commercial expression</td></tr>
      </table>
      <p>Use this table as a memory aid. When a stakeholder asks "where does Liquid actually win," map the question to a trade-off row first, then answer.</p>
    `, drill:["9.2","12.2"]}
  ]},

  /* ===== Module 6 ===== */
  {id:"m6", title:"Module 6 · Deployment environments (10-slice matrix)", lessons:[
    {id:"6.1", title:"Automotive — Mercedes MBUX", html:`
      <p>The flagship environment. <span class="term" data-key="mercedes">Mercedes-Benz</span> ships LFM2-based assistants in <span class="term" data-key="mbux">MBUX Gen 3</span> (next CLA) and <span class="term" data-key="mbux">MBUX Gen 4</span> (H2 2026 North America rollout).</p>
      <p>Why automotive is a near-perfect fit:</p>
      <ul>
        <li>Latency must be sub-second (driver distraction).</li>
        <li>Privacy: voice queries should not leave the car.</li>
        <li>Offline: tunnels, dead zones, rural roads.</li>
        <li>Embedded hardware: NVIDIA Drive / Qualcomm SoC have NPUs but tight memory.</li>
      </ul>
      <p>All four push toward on-device. Mercedes does not need raw frontier-LLM quality; they need consistent, instant, private behavior in a car.</p>
    `, drill:["7.1","12.3"]},

    {id:"6.2", title:"PCs and laptops — AMD Ryzen AI", html:`
      <p>The <span class="term" data-key="copilot-plus">Copilot+ PC</span> standard requires 40+ TOPS NPUs. AMD Ryzen AI, Intel Lunar Lake, Qualcomm Snapdragon X all clear it.</p>
      <p>Liquid's primary play here is the AMD relationship: day-zero LFM availability on every Ryzen AI machine, LEAP dispatch across the <span class="term" data-key="tri-engine">CPU/GPU/NPU tri-engine</span>. CES 2026 keynote with Lisa Su was the formal coming-out for this story.</p>
      <p>Competitors on the same surface: <span class="term" data-key="phi-4">Microsoft Phi-4</span> (Microsoft's own default), Apple AFM on Mac, open-weight Llama 3.2 / Qwen3 for prosumer.</p>
    `, drill:["7.2","5.4","11.2"]},

    {id:"6.3", title:"Smartphones", html:`
      <p>The most contested environment and the one where Liquid is structurally most disadvantaged on iOS (Apple AFM is the OS default) and competes harder on Android (multiple model options, Gemini Nano is default but not exclusive).</p>
      <p>Liquid's flagship consumer surface on phones is <span class="term" data-key="apollo">Apollo</span>. Strategically, Apollo proves the technology exists and is feel-able; commercially, it is not how Liquid makes money on phones.</p>
      <p>Money on phones comes from <strong>app developers</strong> who ship LFMs inside their apps via LiquidKit — because they don't want their AI feature to depend on Apple's whim, Apple's quality bar, or Apple Intelligence's coverage.</p>
    `, drill:["3.8","3.9","5.4"]},

    {id:"6.4", title:"Wearables — Brilliant Labs", html:`
      <p>Smart glasses, smart rings, hearables. <span class="term" data-key="brilliant">Brilliant Labs</span> ships LFM2-VL in their Frame product line. Memory budget: hundreds of MB. Power budget: sub-watt. The 450M LFM2-VL variant is built for exactly this.</p>
      <p>Wearables are a useful proof environment because they are the hardest place to run any meaningful AI. If a model runs on Frame, it runs everywhere else.</p>
    `, drill:["7.4","3.3"]},

    {id:"6.5", title:"Robotics", html:`
      <p>Liquid's heritage. <span class="term" data-key="amini">Amini</span>'s LTC self-driving demos at MIT remain among the most viral pieces of LNN proof material. Today, robotics is not a primary commercial market for Liquid — but it is a permanent narrative asset.</p>
      <p>Expect any future humanoid-robot or autonomous-system partnership to land hard in the press because it matches the founder mythology.</p>
    `, drill:["1.7","1.2"]},

    {id:"6.6", title:"Industrial and IoT", html:`
      <p>Quietly the largest unit-volume opportunity. Industrial PLCs, gateway computers, smart meters, factory cameras. Heterogeneous hardware, often heavily constrained, very long deployment lifetimes.</p>
      <p>Liquid's <span class="term" data-key="nanos">Nanos</span> are particularly well-suited here — a 350M task-specific model running on an ARM gateway is the right scale for many industrial inference jobs.</p>
      <p>No publicly named flagship industrial customer yet. (See coverage gaps, <a href="#l-8.6">8.6</a>.)</p>
    `, drill:["3.6"]},

    {id:"6.7", title:"Healthcare — Insilico Medicine", html:`
      <p><span class="term" data-key="insilico">Insilico Medicine</span> uses LFM2-2.6B-MMAI (announced March 2026) for pharma multimodal workloads. Strategically important because it gives Liquid a credible reference outside automotive — extending the proof set into a regulated, high-stakes vertical.</p>
      <p>Caveat: enterprise healthcare procurement asks for SOC 2 and ISO 42001 (<a href="#l-10.5">10.5</a>). Insilico is a specific deal; broader healthcare distribution is gated by the certifications gap.</p>
    `, drill:["7.5","10.5"]},

    {id:"6.8", title:"Defense and sovereign — G42", html:`
      <p><span class="term" data-key="g42">G42</span> (UAE) is Liquid's anchor sovereign-AI relationship. The model: critical AI infrastructure under national control, running on-prem, not dependent on US-hyperscaler cloud.</p>
      <p>Sovereign AI is one of the fastest-growing edge-AI sub-markets. Liquid being non-US-headquartered-or-cloud-bound is an advantage here — but they will compete with sovereign-tilted local players (e.g. Mistral in Europe).</p>
    `, drill:["7.6"]},

    {id:"6.9", title:"Retail and e-commerce — Shopify", html:`
      <p><span class="term" data-key="shopify">Shopify</span> uses LFMs for catalog inference with sub-20ms latency. Demonstrates a high-throughput, server-side-edge use case where the model isn't on a phone but is on workloads that need to respond in real-time at internet scale.</p>
      <p>It's a useful proof for the "edge isn't only consumer devices" thesis.</p>
    `, drill:["7.3"]},

    {id:"6.10", title:"Developer and prosumer (Apollo, LM Studio, llama.cpp)", html:`
      <p>Indie developers, hobbyists, the <span class="term" data-key="reddit-locallama">r/LocalLLaMA</span> community. They run LFMs via llama.cpp, LM Studio, Ollama — and they talk loudly about what works.</p>
      <p>Commercially small. Strategically large: this is where the technical reputation gets shaped, and where opacity bites hardest (Mental Model 5).</p>
    `, drill:["3.8","8.5","12.5"]}
  ]},

  /* ===== Module 7 ===== */
  {id:"m7", title:"Module 7 · Customers and proof points", lessons:[
    {id:"7.1", title:"Mercedes-Benz — the flagship", html:`
      <p>MBUX Gen 3 ships on the next CLA. MBUX Gen 4 rolls out H2 2026 in North America. Both run LFM2-class assistants on the embedded compute platform. This is by a long way the single most-cited proof point in Liquid's materials.</p>
      <p>What it proves:</p>
      <ul>
        <li>LFMs survive real-OEM integration testing (functional safety, quality, supply chain).</li>
        <li>The privacy/latency/offline pitch translates to a regulated, brand-conscious customer.</li>
        <li>A non-Liquid hardware platform can host LFM inference at scale.</li>
      </ul>
      <div class="mm-callout"><div class="mm-label">Mental Model 3 — the half-life problem</div>Mercedes is a finite asset. Reasonable industry estimate: it ages out as <em>the</em> proof point in 18–24 months. By H2 2027 the question shifts from "is Mercedes shipping?" to "who is the <em>next</em> Mercedes-class deal?" If there isn't a credible answer by then, the narrative thins.</div>
    `, drill:["6.1","12.3","4.8"]},

    {id:"7.2", title:"AMD — the strategic investor", html:`
      <p>AMD led the <strong>$250M Series A</strong> in December 2024. That round valued Liquid at $2B+ and made AMD the most strategically aligned investor in the cap table.</p>
      <p>What AMD gets: a credible LLM partner aligned with Ryzen AI tri-engine NPUs. Without Liquid, AMD's Copilot+ story competes against Microsoft Phi on Microsoft's own silicon partners' machines. With Liquid, AMD has a differentiated model story.</p>
      <p>What Liquid gets: distribution to every Ryzen AI machine sold, day-zero developer story, CES 2026 keynote with Lisa Su, ongoing co-engineering of LEAP for Ryzen NPUs.</p>
      <p>Watch carefully: the AMD relationship is non-exclusive on both sides. AMD can partner with others; Liquid can ship on Intel/Apple/Qualcomm. The mutual depth comes from co-engineering, not from contract exclusivity.</p>
    `, drill:["4.8","6.2","12.6"]},

    {id:"7.3", title:"Shopify — non-Mercedes commercial proof", html:`
      <p>Sub-20ms inference on catalog tasks. Proves three things at once: (1) LFMs are fast enough for production e-commerce, (2) the model works in a non-automotive, non-OEM setting, (3) Liquid has a customer with real internet-scale traffic.</p>
      <p>It's a small relationship in revenue terms relative to Mercedes, but disproportionately valuable as breadth proof.</p>
    `, drill:["6.9","4.8"]},

    {id:"7.4", title:"Brilliant Labs — wearable proof", html:`
      <p>LFM2-VL inside Frame smart glasses. Proves the extreme-low-power vision-language story. Useful as a developer-credible reference — the kind of demo a CTO at another wearables company can verify.</p>
    `, drill:["6.4","3.3"]},

    {id:"7.5", title:"Insilico Medicine — regulated-vertical expansion", html:`
      <p>LFM2-2.6B-MMAI, announced March 2026. Pharma multimodal AI. The strategic point of this deal is breadth — extending the proof set into healthcare without yet having the formal certifications a hospital procurement would demand.</p>
      <p>Read the announcement carefully: Insilico is using Liquid for <em>drug discovery</em> workloads, not for clinical decision support. That distinction is what lets the deal exist without ISO 42001 / SOC 2 (<a href="#l-10.5">10.5</a>).</p>
    `, drill:["6.7","10.5"]},

    {id:"7.6", title:"G42 — sovereign AI", html:`
      <p>UAE sovereign-AI partner. Most details non-public. The strategic value is in the <em>category</em> of relationship: Liquid is a viable model partner for nation-state-scale infrastructure decisions, not just enterprise deals.</p>
    `, drill:["6.8"]},

    {id:"7.7", title:"Reading proof — load-bearing vs decorative", html:`
      <table>
        <tr><th>Customer</th><th>Load-bearing because…</th><th>Or decorative because…</th></tr>
        <tr><td>Mercedes</td><td>Largest brand; longest deployment commitment; functional safety</td><td>—</td></tr>
        <tr><td>AMD</td><td>Distribution moat; CES coverage; co-engineering</td><td>—</td></tr>
        <tr><td>Shopify</td><td>Disproves "automotive-only" critique</td><td>If contract details are quiet, may be a smaller-scope pilot</td></tr>
        <tr><td>Brilliant Labs</td><td>Wearable proof; technical credibility</td><td>Frame is a small-volume product</td></tr>
        <tr><td>Insilico</td><td>Healthcare adjacency, multimodal proof</td><td>Drug discovery is not the regulated clinical workload</td></tr>
        <tr><td>G42</td><td>Sovereign category proof</td><td>Most details opaque; hard to validate independently</td></tr>
      </table>
      <p>The pattern: Mercedes and AMD are load-bearing in nearly every conversation. The others are diversification — present to disprove a specific counter-claim ("automotive only," "Anglo-Saxon only," "consumer only").</p>
    `, drill:["12.3","12.6"]}
  ]},

  /* ===== Module 8 ===== */
  {id:"m8", title:"Module 8 · Communications, coverage, and voice", lessons:[
    {id:"8.1", title:"Owned channels", html:`
      <ul>
        <li><strong>liquid.ai blog.</strong> Cadence: roughly bi-weekly during launches, monthly otherwise. Technical-leaning; long posts; Hasani usually co-authored.</li>
        <li><strong>X / Twitter.</strong> @LiquidAI_, @ramin_m_h. Launch announcements, paper threads, occasional benchmark snipes.</li>
        <li><strong>LinkedIn.</strong> Corporate updates, hires, partnership announcements.</li>
        <li><strong>Discord.</strong> Developer community; AMA cadence. Where LEAP / Apollo bugs get triaged.</li>
        <li><strong>YouTube.</strong> Occasional founder talks (MIT CSAIL, NeurIPS, ICLR).</li>
      </ul>
      <p>The owned-channel posture is technical-first, marketing-second. Compared to peers (e.g. Mistral, AI21) Liquid spends less time on hot-take threads and more on long technical posts.</p>
    `, drill:["8.5","8.6","12.5"]},

    {id:"8.2", title:"Executive voices", html:`
      <table>
        <tr><th>Person</th><th>Primary audience</th><th>Best beat</th></tr>
        <tr><td><span class="term" data-key="hasani">Hasani</span></td><td>Technical / ML community</td><td>Architecture, training, benchmarks, the worm story</td></tr>
        <tr><td><span class="term" data-key="rus">Rus</span></td><td>Mainstream &amp; institutional press</td><td>Vision, MIT-CSAIL gravitas, robotics, society of AI</td></tr>
        <tr><td><span class="term" data-key="lechner">Lechner</span></td><td>Academic / theory</td><td>Dynamical systems, foundations</td></tr>
        <tr><td><span class="term" data-key="amini">Amini</span></td><td>Robotics / autonomy press</td><td>Self-driving, embodied AI</td></tr>
      </table>
      <p>Note who does <em>not</em> have a strong public voice: there is no clearly visible product marketing / GTM exec face. That's a marketing-bench depth gap with consequences for opacity (Mental Model 5).</p>
    `, drill:["1.7","12.5"]},

    {id:"8.3", title:"The eight messaging pillars", html:`
      <ol>
        <li><strong>Efficiency-per-parameter.</strong> "Small models that punch up."</li>
        <li><strong>On-device / edge-first.</strong> The category claim.</li>
        <li><strong>Privacy / sovereignty.</strong> Data stays on the device or in-country.</li>
        <li><strong>First-principles non-transformer.</strong> The LNN heritage; "discovered, not compressed."</li>
        <li><strong>Hybrid future.</strong> Cloud + edge complement each other; Liquid bridges.</li>
        <li><strong>Day-zero ecosystem.</strong> Ships across iOS, Android, Windows, Linux, Mac, NPUs.</li>
        <li><strong>Open weights = open knowledge.</strong> Community access matters.</li>
        <li><strong>Agentic AI on-device.</strong> Where the May 2026 wave lives (<a href="#l-11.1">11.1</a>).</li>
      </ol>
      <p>Notice the order: technical pillars (1, 4, 5) precede commercial pillars (3, 6, 7) precede category pillars (2, 8). This is the only logical order — the technical claim has to land before the commercial one becomes credible.</p>
    `, drill:["9.2","9.3","11.3"]},

    {id:"8.4", title:"Fifteen launch wrappers — the framing playbook", html:`
      <p>Liquid's launches reuse a small set of framings. Recognising them helps you read announcements faster.</p>
      <ul>
        <li>"Frontier-quality, edge cost." (LFM2.5-8B-A1B, etc.)</li>
        <li>"Discovered, not compressed."</li>
        <li>"On day zero on [AMD/Apple/etc.]."</li>
        <li>"In your pocket / wrist / car."</li>
        <li>"Privacy by architecture."</li>
        <li>"X seconds to first token on a [device]."</li>
        <li>"Fits in [N] MB."</li>
        <li>"Production-proven by Mercedes / AMD / Shopify."</li>
        <li>"The first [non-transformer / hybrid / on-device-MoE] foundation model to…"</li>
        <li>"Open license, $10M threshold."</li>
        <li>"With our partners at MIT CSAIL…"</li>
        <li>"As Goldman's $7.6T capex shows…" (macro frame)</li>
        <li>"Toward the agentic edge…"</li>
        <li>"X% of frontier quality at Y% of size."</li>
        <li>"Built by the team behind the LTC and CfC papers."</li>
      </ul>
      <p>This is a coherent set, not a grab-bag. Each wrapper carries one of the eight pillars (<a href="#l-8.3">8.3</a>).</p>
    `, drill:["8.3","9.1"]},

    {id:"8.5", title:"External coverage map — who covers Liquid", html:`
      <table>
        <tr><th>Outlet / channel</th><th>Voice</th><th>What they say well</th></tr>
        <tr><td><span class="term" data-key="venturebeat">VentureBeat (Carl Franzen)</span></td><td>Tech-trade</td><td>Most consistent coverage. Five-plus articles across LFM2 launches. Closest thing to a beat reporter.</td></tr>
        <tr><td><span class="term" data-key="mckinsey-qb">McKinsey QuantumBlack</span></td><td>Consulting analyst</td><td>Jan 2026 report named Liquid as an edge-AI architecture exemplar.</td></tr>
        <tr><td><span class="term" data-key="deeplearning-ai">DeepLearning.AI The Batch</span></td><td>Andrew Ng's newsletter</td><td>Feb 2026 piece on LFM2.5 reasoning.</td></tr>
        <tr><td>TechCrunch</td><td>Startup press</td><td>$250M Series A coverage.</td></tr>
        <tr><td><span class="term" data-key="wired-knight">Wired (Will Knight)</span></td><td>Mainstream-tech</td><td>2024 founder profile; established the worm-brain framing.</td></tr>
        <tr><td><span class="term" data-key="bloomberg-worm">Bloomberg</span></td><td>Financial press</td><td>'Worm brains' headline framing — colorful but reductive.</td></tr>
        <tr><td>Forbes</td><td>Mainstream</td><td>Daniela Rus profile, Oct 2025.</td></tr>
        <tr><td><span class="term" data-key="reddit-locallama">Reddit r/LocalLLaMA</span></td><td>Practitioner community</td><td>20+ threads; AMA Oct 2025; where reputation is shaped.</td></tr>
      </table>
    `, drill:["8.6","12.5"]},

    {id:"8.6", title:"Coverage gaps — where Liquid is undercovered", html:`
      <ul>
        <li><strong>Apollo consumer reviews.</strong> No mainstream tech-reviewer treatment (Verge, MKBHD, Engadget). Apollo's quality is unverified outside Liquid's own materials.</li>
        <li><strong>Industry analysts.</strong> Gartner / Forrester have not put Liquid in a named-vendor quadrant. Important for enterprise procurement.</li>
        <li><strong>Independent technical voices.</strong> Simon Willison, Latent Space, Sebastian Raschka, and similar deep-technical commentators don't write about Liquid often. Lowers the technical-mindshare conversion rate.</li>
        <li><strong>Deep-tech press at scale.</strong> Ars Technica, The Verge — sparse coverage compared to peers.</li>
        <li><strong>Localized / non-English press.</strong> Coverage skews heavily Anglo. The sovereign-AI story would benefit from non-English flagship pieces.</li>
      </ul>
      <div class="mm-callout"><div class="mm-label">Mental Model 5</div>Each gap is a brand cost. Buyers Google the company, find Carl Franzen's coverage but no Verge review, no Gartner quadrant, no Simon Willison post — and the silence shapes opinion.</div>
    `, drill:["8.7","12.5","3.8"]},

    {id:"8.7", title:"Information opacity — the silent brand cost", html:`
      <p>Liquid is selectively opaque on benchmarks, roadmap, and certifications. The case <em>for</em> opacity: don't show your hand to competitors, don't get pinned to specific benchmark numbers, don't commit to certification timelines you can't meet.</p>
      <p>The case <em>against</em> (Mental Model 5): silence is not neutral. It is filled by:</p>
      <ul>
        <li>Competitors' marketing claims that Liquid won't refute.</li>
        <li>Reddit speculation about LFM behavior on use cases Liquid never describes.</li>
        <li>Analyst defaults to whatever Apple/Google/Microsoft publishes.</li>
        <li>Buyers' assumption that "if they were good at X, they'd have shown it by now."</li>
      </ul>
      <p>The honest assessment is that some opacity is necessary — but the current ratio of opacity-to-disclosure leans further toward opacity than it should for a Phase-3 category leader making enterprise sales.</p>
    `, drill:["12.5","10.5","10.7"]}
  ]},

  /* ===== Module 9 ===== */
  {id:"m9", title:"Module 9 · Differentiation and the anchor sentence", lessons:[
    {id:"9.1", title:"The anchor sentence — line by line", html:`
      <blockquote style="font-size:1.05rem;">Liquid AI ships frontier-quality intelligence to the device — at a fraction of the cost, latency, and energy — through foundation models whose architectures were discovered, not compressed, and proven in production by Mercedes-Benz, AMD, Shopify, and Brilliant Labs.</blockquote>
      <p>Every clause is doing work. Pull it apart:</p>
      <ul>
        <li><strong>"ships … to the device"</strong> — set selection. Not cloud. Not API. Not "available on Hugging Face." On the device.</li>
        <li><strong>"frontier-quality"</strong> — quality claim. Concedes that frontier is the benchmark; positions LFMs as in that league for their target tasks.</li>
        <li><strong>"intelligence"</strong> — not "models," not "tokens." Operates at the value level, not the technical artefact.</li>
        <li><strong>"a fraction of the cost, latency, and energy"</strong> — the trade-off triad. Each word is a Ring 5 attack surface and a Ring 2/3/4 differentiator.</li>
        <li><strong>"foundation models"</strong> — refuses the SLM label. Preserves architectural framing.</li>
        <li><strong>"architectures were discovered, not compressed"</strong> — the philosophical claim. Distillation rivals (Phi, Gemma 3n, Llama 3.2) are positioned as compressed; Liquid is not.</li>
        <li><strong>"proven in production by Mercedes-Benz, AMD, Shopify, and Brilliant Labs"</strong> — proof inventory. Four references covering automotive, hardware, e-commerce, wearables.</li>
      </ul>
      <p>If you can recite the anchor and unpack any of its clauses on demand, you've internalized 70% of how Liquid wants to be talked about.</p>
    `, drill:["4.3","2.9","7.1","7.2","7.3","7.4"]},

    {id:"9.2", title:"Six differentiators", html:`
      <ol>
        <li><strong>Hybrid architecture (10 conv + 6 GQA in LFM2; zero-KV scale-up in LFM2.5).</strong></li>
        <li><strong>STAR-discovered, not distilled.</strong></li>
        <li><strong>Production proof across six verticals.</strong></li>
        <li><strong>AMD-aligned tri-engine NPU distribution.</strong></li>
        <li><strong>Multi-platform breadth (iOS, Android, Mac, Windows, Linux, embedded).</strong></li>
        <li><strong>LNN scientific lineage (LTC, CfC, peer-reviewed).</strong></li>
      </ol>
      <p>None of these is on its own a winner. The argument is that the <em>combination</em> is unique: nobody else has STAR + Mercedes + AMD + LNN heritage + cross-platform + hybrid recipe.</p>
    `, drill:["2.4","1.6","7.7","4.8"]},

    {id:"9.3", title:"Whoever defines the trade-off wins (revisited)", html:`
      <p>If buyers compare LFMs on Artificial Analysis benchmark scores, Liquid loses. Their AA score is around 6/10 — credible but mid (<a href="#l-10.2">10.2</a>).</p>
      <p>If buyers compare LFMs on latency + privacy + offline at fixed power budget, Liquid wins.</p>
      <p>The whole communications strategy is in service of getting buyers to use the second comparison, not the first.</p>
      <div class="mm-callout"><div class="mm-label">Mental Model 2 — fully unpacked</div>
        <strong>Whoever defines the trade-off wins the category.</strong> This is the most actionable mental model in the curriculum. Apply it backward to read any vendor's strategy: every pitch deck embeds a chosen trade-off; reading which one tells you who they are trying to beat and who they are pretending not to compete with.
      </div>
    `, drill:["10.2","9.1","12.2"]},

    {id:"9.4", title:"Privacy / latency / offline as positioning", html:`
      <p>The three sub-claims behind the trade-off:</p>
      <ul>
        <li><strong>Privacy.</strong> Inference on-device means user data does not leave the device. Avoids the GDPR / EU AI Act / sectoral-regulation surface area entirely for many use cases.</li>
        <li><strong>Latency.</strong> Local inference removes the round-trip. For voice (~150ms perceptible) and automotive (~50ms safety-relevant), this is decisive.</li>
        <li><strong>Offline.</strong> Tunnels, planes, rural roads, disaster scenarios. The cloud-only assistant goes mute; on-device doesn't.</li>
      </ul>
      <p>Each of these is also a regulatory / strategic argument for enterprise buyers, not just a consumer-feature argument. That's why the same trio appears in Mercedes' OEM justification and in G42's sovereign-AI rationale.</p>
    `, drill:["6.1","6.8","4.4"]}
  ]},

  /* ===== Module 10 ===== */
  {id:"m10", title:"Module 10 · Vulnerabilities and threats", lessons:[
    {id:"10.1", title:"The $10M license threshold — the mid-market trap", html:`
      <p>The license that says "free under $10M" makes mid-market commercial use awkward. Companies between $10M and $100M revenue often will:</p>
      <ul>
        <li>Not want to negotiate a custom contract (slow, requires legal effort, opaque pricing).</li>
        <li>Want a self-serve option with predictable per-seat or per-token pricing.</li>
        <li>Default to alternatives: <span class="term" data-key="qwen3">Qwen3</span>, <span class="term" data-key="llama-3.2">Llama 3.2</span>, or <span class="term" data-key="apple-afm">Apple AFM</span> on iOS.</li>
      </ul>
      <p>Could Liquid fix this by adding a published mid-tier? Yes — but that would change the business model in a way the team has so far chosen not to. See Mental Model 4.</p>
    `, drill:["3.10","12.4"]},

    {id:"10.2", title:"Artificial Analysis 6/10 — the benchmark gap", html:`
      <p>Independent benchmarks like <span class="term" data-key="artificial-analysis">Artificial Analysis</span> show LFM-class models around 6/10. That's credible — clearly above hobby — but not frontier.</p>
      <p>Why this matters: many enterprise buyers' first filter is "show me your AA score." If you're at 6 and a Phi-4 / Qwen3 alternative is at 7.5, the conversation can stop before the trade-off frame can land.</p>
      <p>Liquid's mitigation: get the buyer to look at <em>edge-specific</em> benchmarks (latency-per-token, joules-per-token, KV-cache-at-32K) where the hybrid architecture pulls ahead. See <a href="#l-9.3">9.3</a>.</p>
    `, drill:["9.3","2.4"]},

    {id:"10.3", title:"Multimodal parity gaps", html:`
      <p>Vision (LFM2-VL) and audio (LFM2-Audio) lag the best modality-specialists in raw quality. Cartesia is better at audio quality. PaliGemma 2 and Gemma 3n are competitive on vision. The LFM advantage is breadth + integration, not per-modality dominance.</p>
      <p>Implication: in deals where a single modality is decisive (a pure voice-agent product, a pure vision-OCR product), Liquid will lose to specialists.</p>
    `, drill:["3.3","3.4","10.8"]},

    {id:"10.4", title:"Context length gap", html:`
      <p>LFM2 base models cap around 32K. LFM2.5-8B-A1B reaches 128K. Frontier models reach 256K–1M.</p>
      <p>On phones, 32K is more than enough for any single-document or conversational task. On laptops and on-prem servers, where users might want to fit a whole codebase, the gap is meaningful.</p>
      <p>This is a quantitative gap that closes with engineering effort. Expect future LFM generations to address it directly.</p>
    `, drill:["2.5"]},

    {id:"10.5", title:"No ISO 42001 / SOC 2 — the procurement wall", html:`
      <p>Many enterprise procurement processes require vendor certifications: SOC 2 Type II, ISO 27001, increasingly ISO 42001 for AI specifically. Liquid does not publicly hold these.</p>
      <p>The practical effect: Liquid can be technically the best fit and still be filtered out at the procurement-form stage in regulated industries (banking, insurance, healthcare delivery, defense subcontracting).</p>
      <p>Time to fix: 12–18 months minimum from a standing start. The cost is real — both staffing and audit fees — but it's a known cost and competitors like IBM Granite already have these badges.</p>
    `, drill:["6.7","6.8","8.7"]},

    {id:"10.6", title:"Runtime commoditization — FastFlowLM and friends", html:`
      <p>If <span class="term" data-key="fastflowlm">FastFlowLM</span> (AMD-aligned), <span class="term" data-key="executorch">ExecuTorch</span> (Meta), and <span class="term" data-key="mlx">MLX</span> (Apple) generalize to run any quantized model on any NPU, LEAP loses some of its differentiation. The runtime becomes a commodity layer; competition moves to the model itself — where Liquid's score is 6/10.</p>
      <p>Liquid's defense: keep co-engineering specific optimizations with hardware partners that runtimes don't replicate. Plus LiquidKit's developer ergonomics on iOS/Android — both of which are above commodity even when the underlying runtime isn't.</p>
    `, drill:["3.7","3.9","11.2"]},

    {id:"10.7", title:"Nascent developer ecosystem", html:`
      <p>Liquid's developer ecosystem is small compared to Hugging Face's overall community, Ollama's, llama.cpp's. Tutorials, Stack Overflow answers, third-party tools — the long tail is thin.</p>
      <p>This is partly a Phase-3 (mid-2025) consequence: a 18-month-old commercial brand cannot have a 6-year developer community. Time fixes it if invested in. Apollo + Discord + LEAP examples are the bets here.</p>
    `, drill:["3.7","3.8","8.1"]},

    {id:"10.8", title:"Audio contested by Cartesia", html:`
      <p><span class="term" data-key="cartesia">Cartesia</span> is the most uncomfortable Ring-1 competitor. Same architectural family (Mamba/SSM heritage), purpose-built for real-time voice, strong technical reputation. LFM2-Audio is real but not best-in-class for voice generation.</p>
      <p>Liquid's response is to compete on integration — voice as one of many on-device modalities — rather than head-to-head on voice quality. That's a defensible choice but it concedes the pure-voice deals.</p>
    `, drill:["3.4","5.2"]},

    {id:"10.9", title:"Beachheads ≠ moats — the white-space closing problem", html:`
      <p>Apple AFM gets better every WWDC. Gemini Nano gets better every Pixel release. Microsoft Phi gets better every Build. The white space Liquid has lived in — "Apple/Google/Microsoft on-device defaults are OK but not great" — is closing at platform-vendor pace.</p>
      <div class="mm-callout"><div class="mm-label">Mental Model 6</div>
        <strong>Beachheads are wedges, not moats.</strong> Each Liquid foothold (automotive, AMD PCs, Apple-Silicon dev community, sovereign) opens space. None of them is permanently defensible. The beachhead-to-category-leader narrative has to refresh annually with new vertical wins, or the white space disappears.
      </div>
      <p>This is the single largest strategic risk in the curriculum. Hold onto it.</p>
    `, drill:["12.6","4.8","7.7"]}
  ]},

  /* ===== Module 11 ===== */
  {id:"m11", title:"Module 11 · May 2026 inflection — agentic edge", lessons:[
    {id:"11.1", title:"What changed in May 2026", html:`
      <p>In a roughly four-week window in May 2026:</p>
      <ul>
        <li><strong>Google released Gemma 4.</strong> Strong benchmarks; agentic on-device features tied into Android.</li>
        <li><strong>Alibaba released Qwen 3.7.</strong> Best open-weight benchmarks at small sizes.</li>
        <li><strong>Meta released Muse Spark.</strong> Hybrid on-device + cloud agent architecture for Llama.</li>
        <li><strong>Microsoft signalled an aggressive SLM-first pivot.</strong> Phi-4 reframed as the agentic-edge engine.</li>
        <li><strong>Liquid released LFM2.5-8B-A1B</strong> (May 28). Their flagship answer.</li>
      </ul>
      <p>The collective signal: the agentic-on-device wave has begun. Models are no longer judged on stand-alone Q&amp;A; they're judged on whether they can plan, call tools, and run in a loop on the device.</p>
    `, drill:["2.5","5.4","5.5"]},

    {id:"11.2", title:"Microsoft's SLM pivot — what it means for everyone", html:`
      <p>Microsoft moving toward "SLM-first agentic" is the most consequential shift in the May 2026 wave. Two implications:</p>
      <ol>
        <li><strong>Ring 3 is now more crowded for Liquid.</strong> Microsoft was previously the least aggressive big-tech on-device player. They are now leaning in via Phi-4 agents + Copilot+.</li>
        <li><strong>The Belcak SLM thesis is validated by the most important enterprise software vendor on Earth.</strong> Helpful for everyone in the SLM/edge category, including Liquid — but it raises the stakes on differentiation.</li>
      </ol>
    `, drill:["5.4","5.5"]},

    {id:"11.3", title:"Agentic on-device — Liquid's response", html:`
      <p>Liquid's positioning for the agentic wave rests on three pieces:</p>
      <ul>
        <li><strong>LFM2.5-1.2B-Thinking.</strong> Brings reasoning chain capability to 900MB phones.</li>
        <li><strong>LFM2.5-8B-A1B MoE.</strong> Sparse activation gives 8B-scale knowledge at 1.5B-scale cost — necessary for multi-step agent loops.</li>
        <li><strong>Nanos for tool calling.</strong> Function-call Nanos do the deterministic parts of an agent loop without burning the bigger model's budget.</li>
      </ul>
      <p>The implicit architecture: Thinking model for plan/reason, Nanos for tool execution, all coordinated by LEAP. It's elegant on paper. The question is whether the agentic developer ecosystem builds on Liquid or on Microsoft / Apple defaults.</p>
    `, drill:["3.5","3.6","3.7","12.6"]},

    {id:"11.4", title:"What to watch in the next six months", html:`
      <ul>
        <li><strong>Apple Foundation Models framework adoption.</strong> If iOS developers default to AFM-only, third-party on-device LLMs lose share on iPhones.</li>
        <li><strong>Mercedes MBUX Gen 4 NA launch (H2 2026).</strong> The proof becomes visible to American press; coverage cycle is critical.</li>
        <li><strong>Liquid Series B or partnership news.</strong> Cash runway and strategic alignment for the next 18 months.</li>
        <li><strong>Any ISO 42001 / SOC 2 announcement.</strong> Unlocks regulated buyers.</li>
        <li><strong>An industrial-IoT flagship.</strong> Would address the proof breadth question (<a href="#l-6.6">6.6</a>).</li>
        <li><strong>Gartner / Forrester quadrant entry.</strong> Would close a coverage gap (<a href="#l-8.6">8.6</a>).</li>
        <li><strong>An LFM3 architectural reveal.</strong> Each generation has been ~12 months; due late 2026 or H1 2027.</li>
      </ul>
    `, drill:["10.5","8.6","12.3"]}
  ]},

  /* ===== Module 12 ===== */
  {id:"m12", title:"Module 12 · The six mental models (consolidated)", lessons:[
    {id:"12.1", title:"Mental Model 1 — Set selection IS positioning", html:`
      <p><strong>${MENTAL_MODELS[0].full}</strong></p>
      <p>Where it surfaces in this curriculum:</p>
      <ul>
        <li>Phase 2 → Phase 3 pivot, in which Liquid stopped competing with frontier labs (<a href="#l-4.3">4.3</a>).</li>
        <li>The ring framing itself — choosing rings rather than a quadrant is set selection (<a href="#l-5.1">5.1</a>).</li>
        <li>"Foundation model" instead of "SLM" as the brand label (<a href="#l-5.5">5.5</a>).</li>
      </ul>
      <p>Apply it: any vendor presentation answers two implicit questions — "what category am I in?" and "who am I in it with?" The answer to the second question <em>creates</em> the first category.</p>
    `, drill:["4.3","5.1","5.5"]},

    {id:"12.2", title:"Mental Model 2 — Defining the trade-off wins", html:`
      <p><strong>${MENTAL_MODELS[1].full}</strong></p>
      <p>Where it surfaces:</p>
      <ul>
        <li>"Discovered, not compressed" as the architectural trade-off frame (<a href="#l-2.9">2.9</a>).</li>
        <li>Privacy / latency / offline as the buyer-facing trade-off (<a href="#l-9.4">9.4</a>).</li>
        <li>Reframing benchmarks toward edge-specific metrics (<a href="#l-9.3">9.3</a>).</li>
      </ul>
      <p>Apply it: when reading a competitor announcement, find the axis they're proposing. That tells you who they're trying to beat and who they're declining to compete with.</p>
    `, drill:["2.9","9.3","9.4"]},

    {id:"12.3", title:"Mental Model 3 — Production proof has a half-life", html:`
      <p><strong>${MENTAL_MODELS[2].full}</strong></p>
      <p>Where it surfaces:</p>
      <ul>
        <li>Mercedes as the load-bearing proof point and its ~18-24-month half-life (<a href="#l-7.1">7.1</a>).</li>
        <li>The diversification proofs (Shopify, Brilliant, Insilico, G42) addressing this risk (<a href="#l-7.7">7.7</a>).</li>
        <li>"What to watch": expect either a new flagship or an MBUX-deepening announcement before late 2027 (<a href="#l-11.4">11.4</a>).</li>
      </ul>
      <p>Apply it: every named-customer slide in a deck is dated. A Mercedes reference that's been the lead anchor for two years is doing less work than one that's been there for six months.</p>
    `, drill:["7.1","7.7","11.4"]},

    {id:"12.4", title:"Mental Model 4 — License choice is business model choice", html:`
      <p><strong>${MENTAL_MODELS[3].full}</strong></p>
      <p>Where it surfaces:</p>
      <ul>
        <li>The $10M threshold in the LFM Open License (<a href="#l-3.10">3.10</a>).</li>
        <li>The mid-market trap it creates (<a href="#l-10.1">10.1</a>).</li>
        <li>Comparative reading: Qwen3's Apache-2.0-style license forces a wholly different (volume/ecosystem) motion.</li>
      </ul>
      <p>Apply it: read any open-weight competitor's license before reading their pitch deck. The license tells you what motion they have to use; the deck rationalizes it.</p>
    `, drill:["3.10","10.1"]},

    {id:"12.5", title:"Mental Model 5 — Information opacity has a brand cost", html:`
      <p><strong>${MENTAL_MODELS[4].full}</strong></p>
      <p>Where it surfaces:</p>
      <ul>
        <li>Apollo's unreviewed status in mainstream tech press (<a href="#l-3.8">3.8</a>, <a href="#l-8.6">8.6</a>).</li>
        <li>Selective benchmark disclosure (<a href="#l-8.7">8.7</a>).</li>
        <li>Absent Gartner / Forrester positioning (<a href="#l-8.6">8.6</a>).</li>
        <li>The "worm-brain" framing dominating mainstream press in absence of louder Liquid-controlled narrative (<a href="#l-1.4">1.4</a>, <a href="#l-8.5">8.5</a>).</li>
      </ul>
      <p>Apply it: every unpublished number is a published number in someone else's voice.</p>
    `, drill:["3.8","8.6","8.7"]},

    {id:"12.6", title:"Mental Model 6 — Beachheads ≠ moats", html:`
      <p><strong>${MENTAL_MODELS[5].full}</strong></p>
      <p>Where it surfaces:</p>
      <ul>
        <li>Apple/Google/Microsoft on-device defaults closing white space (<a href="#l-10.9">10.9</a>).</li>
        <li>AMD distribution moat being non-exclusive (<a href="#l-7.2">7.2</a>).</li>
        <li>Need for annual beachhead-to-category-leader narrative refresh (<a href="#l-4.8">4.8</a>).</li>
      </ul>
      <p>Apply it: ask of any Liquid proof "is this a wedge or a moat?" Almost always: wedge. Then ask "what's the next wedge?"</p>
    `, drill:["10.9","4.8"]}
  ]},

  /* ===== Module 13 ===== */
  {id:"m13", title:"Module 13 · Interrogation prompts and gaps", lessons:[
    {id:"13.1", title:"Prompts by product", html:`
      <ol>
        <li>Walk through LFM2's hybrid recipe and explain in your own words what each component costs and what it earns.</li>
        <li>Why is LFM2.5-8B-A1B's 18-conv + 6-attention design strictly better at long context than a same-size all-attention model? Where is it worse?</li>
        <li>Sketch a Nano you would commission for an industrial customer. What task, what size, what training data, what deployment?</li>
        <li>Explain the existence of Apollo as a product strategy decision rather than a marketing one.</li>
        <li>If the $10M license threshold were raised to $50M, what changes in Liquid's GTM and what stays the same?</li>
      </ol>
    `, drill:["2.4","2.5","3.6","3.8","3.10"]},

    {id:"13.2", title:"Prompts by competitor", html:`
      <ol>
        <li>Make the most generous case for Apple AFM 3 being a sufficient competitor to Liquid on iOS for 90% of developers. Then make the rebuttal.</li>
        <li>Where would you place Cartesia in the rings, and why might Liquid have reasons to keep it in Ring 1 rather than Ring 2 even though it competes commercially in Ring 2?</li>
        <li>What kinds of customers are most likely to choose Qwen3 over LFM2.5? What changes that?</li>
        <li>If you were running competitive intelligence at Microsoft, what's the most worrying Liquid move in the next 12 months?</li>
      </ol>
    `, drill:["5.2","5.3","5.4","5.5"]},

    {id:"13.3", title:"Prompts by deployment environment", html:`
      <ol>
        <li>Rank the ten deployment environments by Liquid's current strength of position. Defend the bottom three.</li>
        <li>Which environment is most exposed to the May 2026 agentic-edge wave, for or against Liquid?</li>
        <li>If you had to ship a new vertical flagship by end of 2027 to maintain narrative momentum, which environment would you choose and why?</li>
      </ol>
    `, drill:["6.1","6.2","6.3","6.6","11.1"]},

    {id:"13.4", title:"Prompts by mental model", html:`
      <ol>
        <li>Apply Mental Model 1 to a competitor of your choice. What is their chosen set, what does it signal, what set did they decline to enter?</li>
        <li>Apply Mental Model 2 to a non-AI category you know well. Does the "trade-off defines the category" claim hold?</li>
        <li>Estimate the half-life of two non-Mercedes proof points. What signals would tell you they were aging?</li>
        <li>Read the Mistral / Apache 2.0 license terms; apply Mental Model 4. What business model does Mistral have to run?</li>
        <li>List the three opacity decisions you would reverse first if you became Liquid's head of comms tomorrow.</li>

      </ol>
    `, drill:["12.1","12.2","12.3","12.4","12.5","12.6"]},

    {id:"13.5", title:"Gaps checklist (yours to edit)", html:`
      <p>This is your personal gap-tracker. Use the textarea below to record what you still don't understand — and revisit each entry when you've closed the gap. Your notes are saved locally in your browser.</p>
      <p>Starter prompts:</p>
      <ul>
        <li>"I cannot yet explain to a non-technical audience why ___."</li>

      <p>Update this lesson's notes as you close gaps. When the list is empty, you have hit competence.</p>
    `, drill:["0.4"]}
  ]}
];
